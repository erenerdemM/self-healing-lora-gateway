# [Config Faz1_MeshTeyit] — Mesh Hop Kanıt Testi
# =============================================================================
# AMAÇ: GW'nin internet bağlantısı kesilince sensör verilerinin
#       MeshNode üzerinden komşu GW'ye yönlendirildiğini kanıtla.
#
# SENARYO:
#   sensor[0] @500m → hybridGW1 (LoRa, her zaman ulaşılabilir ✓)
#   t=0-30s:  hybridGW1 internet AÇIK → SENARYO A (doğrudan NetworkServer)
#   t=30s:    hybridGW1 BACKHAUL KESİNTİSİ → SENARYO B aktif
#   t>30s:    hybridGW1 → meshNode[0] → (ACTIVE_TX log = V1 kanıt) ✓
#
# KANIT ZİNCİRİ (log grep ile izle):
#   Adım 1: [HybridRouting] SENARYO A → doğrudan NS (t=15s pkt#1)
#   Adım 2: [HybridRouting] ████ BACKHAUL KESİNTİSİ ████ (t=30s)
#   Adım 3: [HybridRouting] SENARYO B → SensorDataPacket → Hedef GW: 10.20.0.1
#   Adım 4: [HybridRouting] sendDirect → meshNode[0].meshRouting.routeRequestIn
#   Adım 5: [MeshRouting] Yönlendirme talebi alındı → Seçilen next-hop → ACTIVE_TX
