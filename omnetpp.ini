# =============================================================================

[Config Scalable_GW4_Mesh2_MAX]
network        = LoraMesh_GW4_Mesh2_MAX
sim-time-limit = 1200s
description    = "Scalable_GW=4 Mesh=2 MAX: 40 sensör, 6 MeshNode, sigma=0, gamma=2.75, sendInterval=180s (BTK/KET GlobalMax)"

output-scalar-file = results/Scalable_GW4_Mesh2_MAX-${runnumber}.sca

**.scalar-recording = true
**.vector-recording = false

# ── Kartezyen çarpım: sensorSF × meshSF = 36 run ──────────────────────────
