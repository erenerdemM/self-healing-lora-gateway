# =============================================================================

[Config Faz4_GW4_Mesh7_MAX]
network        = LoraMesh_GW4_Mesh7_MAX
sim-time-limit = 1200s
description    = "Faz4_GW=4 Mesh=7 MAX: 40 sensör, 21 MeshNode, sigma=5.0, gamma=2.8, obstacle=3.5dB, noiseFloor=-105dBm, sendInterval=180s (BTK/KET YasalSinir)"

output-scalar-file = results_faz4/Faz4_GW4_Mesh7_MAX-${runnumber}.sca

**.scalar-recording = true
**.vector-recording = false

# ── Kartezyen çarpım: sensorSF × meshSF = 36 run ──────────────────────────
