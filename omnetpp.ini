# =============================================================================
# [Config MetroScale] — Metropol Ölçekli Simülasyon
# 5000×5000 m  |  20 HybridGW  |  150 MeshNode  |  100 Sensör (5/GW)
# Strateji: GW 01-15 (satır 0-2) t<20s'de kesilir → sensörler (t≥40s) tam
#            SENARYO B (mesh failover) ile başlar. GW 16-20 (satır 3) omurga.
# =============================================================================
[Config MetroScale]
network        = LoraMeshNetworkMetro
sim-time-limit = 600s
description    = "Metro-Scale: 20 HybridGW, 150 MeshNode, 100 Sensor | 5000x5000m"

# ── ARP / IP ──────────────────────────────────────────────────────────────────
**.arp.typename = "GlobalArp"
LoraMeshNetworkMetro.configurator.config          = xmldoc("network-config-metro.xml")
LoraMeshNetworkMetro.configurator.addStaticRoutes = false

# ── Mobility ─────────────────────────────────────────────────────────────────
**.mobility.initFromDisplayString = false

# ── GW Ethernet devre dışı (Ethernet bağlantısı yok) ─────────────────────────
**.hybridGW*.numEthInterfaces = 0

# ── PacketForwarder → NetworkServer (stub; UDP ulaşmaz ama crash olmaz) ───────
**.hybridGW*.packetForwarder.destAddresses = "networkServer"
**.hybridGW*.packetForwarder.destPort      = 1000

# ── NetworkServer (stub — recv only) ──────────────────────────────────────────
**.networkServer.numApps                    = 1
**.networkServer.app[0].typename            = "NetworkServerApp"
**.networkServer.app[0].localPort           = 1000
**.networkServer.app[0].adr                 = false
**.networkServer.app[0].confirmedMessages   = false

# ── Beacon Katmanı Global ─────────────────────────────────────────────────────
**.routingAgent.beaconInterval   = 10s
**.routingAgent.neighborTimeout  = 60s
**.meshNode*.meshRouting.neighborTimeout = 60s

# ── 50 Sensör — wildcard konfigürasyonu ──────────────────────────────────────
**.sensorGW*[*].numApps                      = 1
**.sensorGW*[*].app[0].typename              = "SensorLoRaApp"
**.sensorGW*[*].app[0].numberOfPacketsToSend = 0
**.sensorGW*[*].app[0].startTime             = uniform(40s, 70s)
**.sensorGW*[*].app[0].sendInterval          = uniform(60s, 90s)
**.sensorGW*[*].app[0].dataSize              = 11B
**.sensorGW*[*].app[0].initialLoRaTP         = 14dBm
**.sensorGW*[*].app[0].initialLoRaCF         = 868MHz
**.sensorGW*[*].app[0].initialLoRaSF         = 12
**.sensorGW*[*].app[0].initialLoRaBW         = 125kHz
**.sensorGW*[*].app[0].initialLoRaCR         = 4
**.sensorGW*[*].app[0].initialUseHeader      = true

# ── Mesh WLAN → wlanMedium ────────────────────────────────────────────────────
**.meshNode*.wlan[*].radio.radioMediumModule = "wlanMedium"

# ── LoRa Fiziksel Katman ──────────────────────────────────────────────────────
**.radioMedium.mediumLimitCache.maxTransmissionDuration = 5s
**.radioMedium.pathLossType          = "LoRaLogNormalShadowing"
**.sigma                             = 3.57
**.minInterferenceTime               = 0s
