# =============================================================================
# [Config Faz1_Kalibrasyon] — Rev2: 36-Run Cartesian Product (sensorSF × meshSF)
# =============================================================================
# FAZ 1: SIFIR rastsalık, engelsiz açık arazi, ETSI %1 Duty Cycle uyumlu.
# Topoloji: 1 GW (x=0) + 5 sensör (x=2-5-10-15-25km) + 5 MeshNode lineer zincir
#
# KARTEZYEN ÇARPIM — 36 koşu (run=0..35):
#   sensorSF × meshSF = {7,8,9,10,11,12} × {7,8,9,10,11,12}
#   run  0: sensorSF=7,  meshSF=7  | run  6: sensorSF=8,  meshSF=7
#   run  1: sensorSF=7,  meshSF=8  | run  7: sensorSF=8,  meshSF=8
#   ...                            | ...
#   run  5: sensorSF=7,  meshSF=12 | run 35: sensorSF=12, meshSF=12
#
# ETSI 1% DC UYUMLU PARAMETRELER (PL=20B, BW=125kHz/sensör, BW=250kHz/mesh):
#   sensorSF | sendInterval | ToA(20B) |  DC%   | meshSF | beaconInterval
#   SF7      |   6.2s       |  56.6ms  | 0.91%  | SF7    |   5.0s
#   SF8      |  11.3s       | 102.9ms  | 0.91%  | SF8    |   9.0s
#   SF9      |  20.6s       | 185.3ms  | 0.90%  | SF9    |  17.0s
#   SF10     |  41.0s       | 370.7ms  | 0.90%  | SF10   |  29.0s
#   SF11     |  82.0s       | 741.4ms  | 0.90%  | SF11   |  63.0s
#   SF12     | 147.0s       |1318.9ms  | 0.90%  | SF12   | 265.0s
#
# BEKLENTI (sigma=0 → deterministik, GW sens per sensorSF):
#   sensorSF7/8  → sensor[0,1]  ulaşır (d_max<10km); sensor[2..4] kayıp
#   sensorSF9    → sensor[0..2] ulaşır (d_max<15km); sensor[3,4] kayıp
#   sensorSF10   → sensor[0..3] ulaşır (d_max<25km); sensor[4] kayıp
#   sensorSF11   → sensor[0..3] ulaşır (d_max<25km); sensor[4] hayır
#   sensorSF12   → tüm 5 sensör ulaşır
#   meshSF etkisi: MeshNode relay kapasitesi ve queuingdelay değişir
# =============================================================================

[Config Faz1_Kalibrasyon]
network      = LoraMeshNetworkFaz1
sim-time-limit = 1200s
description  = "Faz1 Rev2: 36-run Cartesian (sensorSF x meshSF), ETSI 1pct DC uyumlu"

# ── Cartesian Product: sensorSF ✕ meshSF → 36 koşu ───────────────────────────
# İKİ BAĞIMSIZ iterasyon → OMNeT++ otomatik Kartezyen çarpım üretir
# (! operatörü YOK → 6×6=36 kombinasyon)
**.sensor[*].app[0].initialLoRaSF       = ${sensorSF = 7, 8, 9, 10, 11, 12}
**.meshNode[*].meshRouting.loraSF       = ${meshSF   = 7, 8, 9, 10, 11, 12}

# ── Sensör Payload: sabit 20B — ETSI 1%DC uyumlu (tüm SF'lerde ~0.91%) ───────
**.sensor[*].app[0].dataSize = 20B

# ── Sensör sendInterval: ETSI 1% DC, sensorSF'e paralel (! sensorSF) ─────────
# ToA(SF,125kHz,20B) × 100 = min DC-uyumlu süre; güvenlik payıyla yuvarlandı
**.sensor[*].app[0].sendInterval = ${sfInterval = 6.2s, 11.3s, 20.6s, 41s, 82s, 147s ! sensorSF}

# ── GW Alıcı Hassasiyeti: sensorSF bağımlı (SX1303+SX1250 datasheet) ─────────
#   SF7:-124 | SF8:-127 | SF9:-130 | SF10:-133 | SF11:-135 | SF12:-141 dBm
**.hybridGW1.LoRaGWNic.radio.receiver.sensitivity = ${gwSensitivity = -124dBm, -127dBm, -130dBm, -133dBm, -135dBm, -141dBm ! sensorSF}

# ── MeshNode beaconInterval: ETSI 1% DC, meshSF'e paralel (! meshSF) ─────────
