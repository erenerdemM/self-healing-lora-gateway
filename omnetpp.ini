# [Config Arazi1_Faz2_Full144] — 6×6×4 = 144 Run Kartezyen Çarpım
# =============================================================================
# AMAÇ: Açık Arazi (Arazi 1) tam metodoloji — sensorSF × meshSF × weatherSigma
#       kombinasyonlarında GW1 backhaul kesintisi, mesh relay, ETSI DC uyumu,
#       hava gölgelemesi ve Drop-Tail darboğaz etkisini kapsamlı ölçmek.
#
# KARTEZYEN ÇARPIM — 144 koşu (run=0..143):
#   sensorSF × meshSF × weatherSigma
#   = {7,8,9,10,11,12} × {7,8,9,10,11,12} × {0.0,3.0,6.0,9.0}
#   = 6 × 6 × 4 = 144 run
#
#   Sıralama (weatherSigma en hızlı, sensorSF en yavaş):
#   run   0: sF=7,  mSF=7,  ws=0.0   run   1: sF=7,  mSF=7,  ws=3.0
#   run   2: sF=7,  mSF=7,  ws=6.0   run   3: sF=7,  mSF=7,  ws=9.0
#   run   4: sF=7,  mSF=8,  ws=0.0   ...
#   run  23: sF=7,  mSF=12, ws=9.0   run  24: sF=8,  mSF=7,  ws=0.0
#   run 143: sF=12, mSF=12, ws=9.0
#
# ETSI 1% DC UYUMLU PARAMETRELER (PL=20B, BW=125kHz/sensör):
#   sensorSF | sendInterval | ToA(20B)  |  DC%   | gwSens  | meshSF | beaconInt | cadDur
#   SF7      |   6.2s       |  56.6ms   | 0.91%  | -124dBm | SF7    |   5.0s    |  1ms
#   SF8      |  11.3s       | 102.9ms   | 0.91%  | -127dBm | SF8    |   9.0s    |  2ms
#   SF9      |  20.6s       | 185.3ms   | 0.90%  | -130dBm | SF9    |  17.0s    |  4ms
#   SF10     |  41.0s       | 370.7ms   | 0.90%  | -133dBm | SF10   |  29.0s    |  8ms
#   SF11     |  82.0s       | 741.4ms   | 0.90%  | -135dBm | SF11   |  63.0s    | 16ms
#   SF12     | 147.0s       |1318.9ms   | 0.90%  | -141dBm | SF12   | 265.0s    | 33ms
#
# FAILOVER & DARBOĞAz:
#   GW1 backhaulCutTime = 30s → t=30s'den itibaren SENARYO B (mesh relay)
#   GW1 maxQueueSize = 50 → Drop-Tail davranışı (darboğaz testi)
#
# TOPOLOJİ: LoraMeshNetworkArazi1
#   GW1(x=0) — MN0(6km) — MN1(12km) — MN2(18km) — MN3(24km) — MN4(27km) — GW2(30km)
#   Sensörler: S0@3km  S1@9km  S2@15km  S3@21km  S4@25.5km
# =============================================================================

[Config Arazi1_Faz2_Full144]
network        = LoraMeshNetworkArazi1
sim-time-limit = 1200s
description    = "Arazi1 Faz2 Full: 6x6x4=144 Cartesian (sensorSF x meshSF x weatherSigma), ETSI 1pct DC, GW1 failover t=30s"

# ── Skalar kayıt (explicit) ───────────────────────────────────────────────────
**.scalar-recording = true
**.vector-recording = false

# ── Üçlü Kartezyen Çarpım: sensorSF × meshSF × weatherSigma = 6×6×4 = 144 ───
# Üç BAĞIMSIZ değişken (! YOK) → OMNeT++ 6×6×4=144 çarpım üretir
**.sensor[*].app[0].initialLoRaSF  = ${sensorSF    = 7, 8, 9, 10, 11, 12}
**.meshNode[*].meshRouting.loraSF   = ${meshSF      = 7, 8, 9, 10, 11, 12}
**.radioMedium.pathLoss.sigma       = ${weatherSigma = 0.0, 3.0, 6.0, 9.0}
**.sigma                            = ${weatherSigma}

# ── sensorSF'e paralel (! sensorSF): sendInterval + gwSensitivity ─────────────
**.sensor[*].app[0].dataSize     = 20B
**.sensor[*].app[0].sendInterval = ${sfInterval = 6.2s, 11.3s, 20.6s, 41s, 82s, 147s ! sensorSF}
**.LoRaGWNic.radio.receiver.sensitivity = ${gwSensitivity = -124dBm, -127dBm, -130dBm, -133dBm, -135dBm, -141dBm ! sensorSF}

# ── meshSF'e paralel (! meshSF): beaconInterval + cadDuration ─────────────────
**.meshNode[*].meshRouting.beaconInterval = ${meshInterval = 5s, 9s, 17s, 29s, 63s, 265s ! meshSF}
**.meshNode[*].meshRouting.cadDuration    = ${cadDur = 1ms, 2ms, 4ms, 8ms, 16ms, 33ms ! meshSF}

# ── LoRaWAN Fiziksel Ortam ────────────────────────────────────────────────────
**.radioMedium.pathLoss.d0          = 1m
**.radioMedium.pathLoss.gamma       = 2.75
**.radioMedium.pathLoss.pl_d0_db    = 31.54
**.radioMedium.pathLoss.max_sensitivity_dBm = -141.0
**.radioMedium.mediumLimitCache.maxTransmissionDuration = 5s
**.radioMedium.pathLossType         = "LoRaLogNormalShadowing"
**.minInterferenceTime              = 0s
**.radioMedium.mediumLimitCacheType = "LoRaMediumCache"
**.radioMedium.rangeFilter          = "communicationRange"
**.radioMedium.neighborCacheType    = "LoRaNeighborCache"
