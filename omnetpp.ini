[Config Scalable_GW2_Mesh4_MAX]
network        = LoraMesh_GW2_Mesh4_MAX
sim-time-limit = 1200s
description    = "Scalable_GW=2 Mesh=4 MAX: 20 sensör, 4 MeshNode, sigma=0, gamma=2.75, sendInterval=180s (BTK/KET GlobalMax)"

