# ── Sensör Uygulama Katmanı (wildcard: tüm sensorGW* dizileri) ─────────────
**.sensorGW*[*].numApps                      = 1
**.sensorGW*[*].app[0].typename              = "SensorLoRaApp"
**.sensorGW*[*].app[0].numberOfPacketsToSend = 0
**.sensorGW*[*].app[0].initialLoRaTP         = 14dBm
