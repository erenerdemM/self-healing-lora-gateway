# =============================================================================
# omnetpp.ini — Self-Healing Hybrid LoRa Gateway Simülasyon Konfigürasyonu
# =============================================================================
# Proje: Kendi Kendini İyileştiren Hibrit LoRa Gateway Mimarisi
#   Eren ERDEM (2020502028) — Melisa KURAL (2021502041)
#   DEÜ EEE — Danışman: Prof. Dr. Damla GÜRKAN KUNTALP
#
# Mimari: EndNode → HybridGW1 → [Mesh] → MeshNode → [Mesh] → HybridGW2 → NetworkServer
#
# [General / V1]: Temel topoloji doğrulama — DER=1.0, packetDropNoRouteFound=0
# [V2-Failover]  : hybridGW1 Ethernet'i t=200s'de kopar → Meshtastic G2G devreye (gelecek)
# [V2-SelfHeal]  : t=400s bağlantı geri gelir → ONLINE moda dönüş (gelecek)
# [V3-Multi]     : 3×EndNode, 2×HybridGW, 2×MeshNode, WRR yük dengeleme (gelecek)
# =============================================================================

[General]
network = LoraMeshNetwork
sim-time-limit = 600s

# =============================================================================
# GlobalArp — ARP istek/cevap paketleri göndermek yerine IP→MAC eşlemesini
# doğrudan InterfaceTable'dan alır.
# Gerekçe: LoRaGW.ned içindeki EthernetEncapsulation modülü
#   IInterfaceRegistrationListener'ı uygulamadığından, gerçek ARP mesajları
#   ipv4.lp dispatcher'ının interfaceIdToGateIndex tablosuna kaydedilemiyor.
#   Bu da "Unknown interface: interfaceId=100" hatasına yol açıyor.
#   GlobalArp bu sorunu tamamen ortadan kaldırır.
# Not: V2'de gerçek Meshtastic/LoRa ortamı eklenince bu satır kaldırılabilir.
# =============================================================================
**.arp.typename = "GlobalArp"

# =============================================================================
# EndNode (sensorNode1) — LoRaWAN saha sensörü
# Donanım: STM32L476RG + E77-900M (PDF Bölüm 3.2)
# Payload: 11B little-endian (sıcaklık/nem/basınç/batarya/sıra no)
# =============================================================================
**.sensorNode1.numApps = 1
**.sensorNode1.app[0].typename = "SensorLoRaApp"
**.sensorNode1.app[0].numberOfPacketsToSend = 0
**.sensorNode1.app[0].startTime = 10s
**.sensorNode1.app[0].sendInterval = 60s
**.sensorNode1.app[0].dataSize = 11B

# EU868 PHY — ETSI EN 300 220 uyumlu (PDF Bölüm 5.5.1)
# SF12: sensitivity=-137dBm, max kapsama alanı, duty cycle: 1%/saat max
**.sensorNode1.app[0].initialLoRaTP = 14dBm
**.sensorNode1.app[0].initialLoRaCF = 868MHz
**.sensorNode1.app[0].initialLoRaSF = 12
**.sensorNode1.app[0].initialLoRaBW = 125kHz
**.sensorNode1.app[0].initialLoRaCR = 4
**.sensorNode1.app[0].initialUseHeader = true

# =============================================================================
# LoRaWAN Fiziksel Ortam (radioMedium) — EndNode ↔ HybridGateway arasında
# =============================================================================
**.radioMedium.mediumLimitCache.maxTransmissionDuration = 5s   # SF12 ToA ~2.8s
**.radioMedium.pathLossType = "LoRaLogNormalShadowing"
**.sigma = 3.57
**.minInterferenceTime = 0s
**.radioMedium.mediumLimitCacheType = "LoRaMediumCache"
**.radioMedium.rangeFilter = "communicationRange"
**.radioMedium.neighborCacheType = "LoRaNeighborCache"
**.radioMedium.neighborCache.range = 1000m
**.radioMedium.neighborCache.refillPeriod = 3000s
LoraMeshNetwork.**.radio.separateTransmissionParts = false
LoraMeshNetwork.**.radio.separateReceptionParts = false

# =============================================================================
# HybridGateway 1 (hybridGW1) — LoRaWAN birincil gateway, internet YOK
# Donanım: RPi CM4 + RAK5146 (SX1303) + Heltec HT-CT62 (SX1262) — PDF Bölüm 5.1
#
# V1: PacketForwarder → networkServer
#     IP yolu: hybridGW1 → meshNode1 (IP router) → hybridGW2 (IP forwarder) → networkServer
#     (Ipv4NetworkConfigurator bu zinciri otomatik kurar)
# V2: Failover Agent state machine, Rlink izleme, ONLINE/FAILOVER mod geçişi
# =============================================================================
**.hybridGW1.packetForwarder.localPort = 2000
**.hybridGW1.packetForwarder.destPort = 1000
**.hybridGW1.packetForwarder.destAddresses = "networkServer"
**.hybridGW1.LoRaGWNic.radio.iAmGateway = true

# =============================================================================
# MeshNode (meshNode1) — Meshtastic relay düğümü
# V1: INET Router — IP forwarding otomatik (Router varsayılanı)
# V2: SX1262 LoRa radyo + MeshtasticMedium ile gerçek mesh relay
# =============================================================================
# (V1: MeshNode extends Router — forwarding=true otomatik, özel parametre yok)

# =============================================================================
# HybridGateway 2 (hybridGW2) — internet çıkışlı hibrit gateway
# Donanım: RPi CM4 + RAK5146 (SX1303) + Heltec HT-CT62 (SX1262) — PDF Bölüm 5.1
#
# V1: IP forwarder olarak çalışır (meshNode1'den geleni networkServer'a iletir)
#     hybridGW2 LoRaGW tabanlı olduğu için forwarding açıkça etkinleştirilmeli.
#     ipv4.forwarding = NetworkLayer seviyesi → routingTable.forwarding=true da olur.
#     (ipv4.ip.forwarding yerine ipv4.forwarding: Ipv4NetworkLayer *.forwarding propagation)
# V2: Meshtastic alıcı modülü + LNS transmitter + QoS queue eklenir
# =============================================================================
**.hybridGW2.ipv4.forwarding = true
# hybridGW2'de PacketForwarder var (LoRaGW tabanı), ancak V1'de LoRa RX yapmaz.
# Parametreler boş bırakılırsa interactive prompt hatası verir → dummy değerler:
**.hybridGW2.packetForwarder.localPort = 2001   # GW1'den farklı port
**.hybridGW2.packetForwarder.destPort = 1000
**.hybridGW2.packetForwarder.destAddresses = "networkServer"
**.hybridGW2.LoRaGWNic.radio.iAmGateway = false  # V1: sadece IP relay, LoRa RX değil
# NOTE: V1 topolojisinde hybridGW2 artık gwRouter2 (INET Router) olarak temsil
# edilmektedir. Bu satırlar yorum olarak korundu — V2'de HybridGateway geri gelince
# aktive edilecek.

# =============================================================================
# NetworkServer — Bulut / Yerel LNS
# Yazılım: ChirpStack v4, TTN, Azure IoT Hub (PDF Bölüm 3.3-3.4)
# =============================================================================
**.networkServer.numApps = 1
**.networkServer.app[0].typename = "NetworkServerApp"
**.networkServer.app[0].localPort = 1000
**.networkServer.app[0].destPort = 2000
**.networkServer.app[0].destAddresses = "hybridGW1"   # downlink ACK hedefi

# =============================================================================
# Konum Parametreleri (StationaryMobility)
# initFromDisplayString=false: ini değerleri kullanılır
# =============================================================================
**.mobility.initFromDisplayString = false

# EndNode: hybridGW1'e ~56m (SF12 ile test edildi, DER=1.0)
**.sensorNode1.mobility.initialX = 310m
**.sensorNode1.mobility.initialY = 240m

# hybridGW1 — LoRaWAN birincil gateway (internet yok)
**.hybridGW1.mobility.initialX = 350m
**.hybridGW1.mobility.initialY = 220m

# meshNode1 — Meshtastic relay (GW1 ile GW2 arasında)
**.meshNode1.mobility.initialX = 500m
**.meshNode1.mobility.initialY = 220m

# hybridGW2 — internet çıkışlı gateway
**.gwRouter2.mobility.initialX = 650m
**.gwRouter2.mobility.initialY = 220m

# NetworkServer — bulut konumu (RF mesafesi önemsiz)
**.networkServer.mobility.initialX = 870m
**.networkServer.mobility.initialY = 220m

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 1000m
**.constraintAreaMaxY = 600m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxZ = 0m
