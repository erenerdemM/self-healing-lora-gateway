# =============================================================================
# Config   : Scalable_GW7_Mesh4_MAX
# GW=7  MeshPerGap=4  Mod=MAX
# Hop=6000m  Gap=30000m  ToplamUzunluk=180000m
# MeshNode=24  Sensör=70 (10/GW)
# Run=36  (sensorSF 7..12 × meshSF 7..12), sigma=0.0
# =============================================================================

[Config Scalable_GW7_Mesh4_MAX]
network        = LoraMesh_GW7_Mesh4_MAX
sim-time-limit = 1200s
description    = "Scalable_GW=7 Mesh=4 MAX: 70 sensör, 24 MeshNode, sigma=0, gamma=2.75, sendInterval=180s (BTK/KET GlobalMax)"

output-scalar-file = results/Scalable_GW7_Mesh4_MAX-${runnumber}.sca

**.scalar-recording = true
**.vector-recording = false

# ── Kartezyen çarpım: sensorSF × meshSF = 36 run ──────────────────────────
**.sensorGW*[*].app[0].initialLoRaSF       = ${sensorSF    = 7, 8, 9, 10, 11, 12}
**.meshNode[*].meshRouting.loraSF           = ${meshSF      = 7, 8, 9, 10, 11, 12}
**.radioMedium.pathLoss.sigma               = 0.0
**.sigma                                    = 0.0

# ── sensorSF paralel (!): sendInterval + gwSensitivity ────────────────────
**.sensorGW*[*].app[0].dataSize      = 20B
**.sensorGW*[*].app[0].sendInterval  = 180s
# NOTE: sendInterval sabit 180s — SF bağımsız trafik yoğunluğu testi
**.LoRaGWNic.radio.receiver.sensitivity = ${gwSensitivity = -124dBm, -127dBm, -130dBm, -133dBm, -135dBm, -141dBm ! sensorSF}

# ── meshSF paralel (!): beaconInterval + cadDuration ──────────────────────
**.meshNode[*].meshRouting.beaconInterval = ${meshInterval = 5s, 9s, 17s, 29s, 63s, 265s ! meshSF}
**.meshNode[*].meshRouting.cadDuration    = ${cadDur       = 1ms, 2ms, 4ms, 8ms, 16ms, 33ms ! meshSF}

# ── LoRaWAN Fiziksel Ortam ─────────────────────────────────────────────────
**.radioMedium.pathLoss.d0          = 1m
**.radioMedium.pathLoss.gamma       = 2.75
**.radioMedium.pathLoss.pl_d0_db    = 31.54
**.radioMedium.pathLoss.max_sensitivity_dBm = -115.0
**.radioMedium.mediumLimitCache.maxTransmissionDuration = 5s
**.radioMedium.mediumLimitCache.maxTransmissionPower = 0.025118W
**.radioMedium.pathLossType         = "LoRaLogNormalShadowing"
**.minInterferenceTime              = 0s
**.radioMedium.mediumLimitCacheType = "LoRaMediumCache"
**.radioMedium.rangeFilter          = "communicationRange"
**.radioMedium.neighborCacheType    = "LoRaNeighborCache"
**.radioMedium.neighborCache.range  = 183000m
**.radioMedium.neighborCache.refillPeriod = 1200s
LoraMesh_GW7_Mesh4_MAX.**.radio.separateTransmissionParts = false
LoraMesh_GW7_Mesh4_MAX.**.radio.separateReceptionParts    = false

# ── Global ARP & IP yönlendirme ────────────────────────────────────────────
**.arp.typename = "GlobalArp"
**.gwRouter0.ipv4.forwarding     = true
**.hybridGW0.ipv4.forwarding     = true
**.gwRouter1.ipv4.forwarding     = true
**.hybridGW1.ipv4.forwarding     = true
**.gwRouter2.ipv4.forwarding     = true
**.hybridGW2.ipv4.forwarding     = true
**.gwRouter3.ipv4.forwarding     = true
**.hybridGW3.ipv4.forwarding     = true
**.gwRouter4.ipv4.forwarding     = true
**.hybridGW4.ipv4.forwarding     = true
**.gwRouter5.ipv4.forwarding     = true
**.hybridGW5.ipv4.forwarding     = true
**.gwRouter6.ipv4.forwarding     = true
**.hybridGW6.ipv4.forwarding     = true

# ── Global GW parametreleri (backhaulCutTime=-1s → daima çevrimiçi) ────────
**.LoRaGWNic.radio.iAmGateway              = true
**.packetForwarder.localPort               = 2000
**.packetForwarder.destPort                = 1000
**.routingAgent.backhaulCutTime            = -1s
**.routingAgent.maxQueueSize               = 200
**.routingAgent.neighborTimeout            = 120s
**.routingAgent.bandMTxPower_dBm           = 14.0
**.routingAgent.bandMDutyCycle             = 0.01
**.routingAgent.rx2TxPower_dBm             = 14.0
**.routingAgent.rx2DutyCycle               = 0.10
**.routingAgent.rx2Frequency               = 869.525MHz
**.routingAgent.antennaGain_dBi            = 0.0
**.routingAgent.numDemodulators            = 16
**.routingAgent.txQuotaWindow              = 3600s
**.routingAgent.beaconRssi                 = -72.0
**.routingAgent.sensorPacketRate           = 5.0

