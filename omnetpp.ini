# =============================================================================
# [Config MidScaleHarsh] — Fiziksel Çevre + Güçlü Gölgelenme + Senkronize Alarm
# =============================================================================
# Bu senaryo MidScale konfigürasyonunu ÜÇLÜ yük altında test eder:
#   1) DielectricObstacleLoss: 15 beton/tuğla bina sinyal yollarını keser
#   2) σ=7.0 ile güçlendirilmiş Log-Normal gölgelenme (normal: σ=3.57)
#   3) Senkronize Alarm Olayı: t=120s ± 1s penceresinde 50 sensör eş-zamanlı uyarı gönderir
# Beklenen etki:
#   • Engel arkasındaki sensörler daha yüksek C_i → dezavantajlı yol seçimi
#   • t=120s anlık yük: LoRa çakışma dalgası + GW kuyruğu → DARBOĞAZ tetiklenir
# Yasal uyumluluk (ETSI EN 300 220-2 v3.2.1 §5.4):
#   SF12/BW125kHz/20B → ToA≈1.97s → sendInterval=exp(600s) → DC=0.33% < 1% ✓

[Config MidScaleHarsh]
extends = MidScale
description = "MidScale + DielectricObstacleLoss + σ=7 gölgelenme + Senkronize Alarm Olayı (t=120s, ETSI uyumlu)"
sim-time-limit = 300s

# ── 1. PhysicalEnvironment: 15 bina XML konfigürasyonu ──────────────────────
LoraMeshNetworkMid.physicalEnvironment.config = xmldoc("obstacles.xml")
LoraMeshNetworkMid.physicalEnvironment.spaceMinX = 0m
LoraMeshNetworkMid.physicalEnvironment.spaceMinY = 0m
LoraMeshNetworkMid.physicalEnvironment.spaceMinZ = 0m
LoraMeshNetworkMid.physicalEnvironment.spaceMaxX = 5200m
LoraMeshNetworkMid.physicalEnvironment.spaceMaxY = 5200m
LoraMeshNetworkMid.physicalEnvironment.spaceMaxZ = 100m

# ── 2. DielectricObstacleLoss: LoRa medium üzerinde etkin ───────────────────
**.radioMedium.obstacleLoss.typename = "DielectricObstacleLoss"

# ── 3. Güçlendirilmiş Log-Normal gölgelenme (σ: 3.57 → 7.0) ────────────────
**.radioMedium.pathLoss.sigma = 7.0

# ── 4. Yasal trafik + Senkronize Alarm (Kriz Anı Simülasyonu) ───────────────
# ETSI EN 300 220-2 v3.2.1 §5.4 – Duty Cycle Hesabı:
#   SF12 / BW=125kHz / payloadBytes=20 → Tsym=32.768ms
#   ToA = Tpreamble(0.40s) + Theader(0.79s) + Tpayload(0.79s) ≈ 1.97 s
#   DC @ exp(600s) = 1.97/600 = 0.33%  →  ETSI sınırı %1'in altında ✓
#
# KRİZ ANINI simüle etmek için: tüm 50 sensör t=119-121s penceresinde uyarı
# gönderir (doğal afet/yangın/alarm senaryosu). Bireysel DC yasal; ancak ağ
# genelinde eş-zamanlı 50 paket şunları üretir:
#   a) LoRa PHY: çakışma dalgası → çoğu paket düşer (rcvBelowSensitivity artar)
#   b) Hayatta kalan paketler GW kuyruklarına yığılır → QueueOccupancy > %75
#      → DARBOĞAZ uyarısı tetiklenir → C_i tabanlı yük dengeleme devreye girer
**.sensorGW*[*].app[0].sendInterval = exponential(600s)   # ~10 dak ortalama → DC=%0.33 ✓
**.sensorGW*[*].app[0].startTime    = uniform(119s, 121s) # Senkronize Alarm Olayı: t=120s

# ── 5. Congestion eşiğini izleme için %75'e indir (darboğazı daha kolay göster)
**.routingAgent.congestionThreshold = 0.75

# ── 6. Modül bazlı ayrıntılı log: sadece routing modülleri DETAIL seviyesinde ─
**.routingAgent.cmdenv-log-level = DETAIL

# =============================================================================
# [Config Urban25km]  —  Kentsel 25 km² Mesh Topolojisi
# =============================================================================
# 4 × HybridGateway  |  8 × MeshNode  |  20 × SensorNode (4 bölge × 5)
# Alan: 5000×5000 m  |  SF10/BW125kHz/EU868  |  γ=4.0  σ=6.0 dB
#
# Quadrant GW konumları:
#   GW1=(1250,1250)m  GW2=(3750,1250)m  GW3=(1250,3750)m  GW4=(3750,3750)m
#   Max sensör→GW mesafesi = √(1250²+1250²) = 1768 m < 2450 m (link budget) ✓
#
# RF Link Budget (SF10/14dBm/−133dBm sensitivity):
#   Budget=149dB, γ=4.0, σ=6dB → d_max=2.45km ✓
#
# ETSI EN 300 220-2 §5.4:
#   ToA(SF10/125kHz/20B) = 0.43s
#   DC @ exp(300s) = 0.43/300 = 0.14% < 1% ✓
#
# MeshNode CAD (SX1262, SF10, CadSymbolNum=2):
#   Tsym=8.192ms → cadDuration=2×Tsym=16ms, cadInterval=40ms
#   Total cycle=56ms → CAD frac=28.6%
#   P_avg=(16/56)×10mA×3.7V + (40/56)×15µA×3.7V = 10.6 mW
#   Pil ömrü: 46620J / 0.01057W = 51 gün → güneş paneli gerekli ✓
# =============================================================================
[Config Urban25km]
network = LoraMeshNetworkUrban25km
sim-time-limit = 600s
description = "Urban25km: 4 HybridGW | 8 MeshNode | 20 Sensor | 5000×5000m | SF10 | γ=4.0"

# ── Genel yapılandırma ───────────────────────────────────────────────────────
**.mobility.initFromDisplayString = false
**.loRaRadio.iAmGateway = false
**.hybridGW*.loRaRadio.iAmGateway = true

# ── LoRa ortam modeli: yoğun kentsel yayılım ────────────────────────────────
# γ=4.0 (kentsel), σ=6.0 dB (yüksek gölgeleme/çoklu-yol)
# Referans: COST 231 model, d0=40m (kentsel orta frekans)
**.pathLoss.gamma            = 4.0
**.pathLoss.sigma            = 6.0
**.radioMedium.neighborCache.range = 3000m   # Maks SF10 horizon

# ── Sensör RF parametreleri: SF10 (kentsel menzil optimizasyonu) ─────────────
**.sensorGW*[*].app[0].initialLoRaSF        = 10
**.sensorGW*[*].app[0].initialLoRaBW        = 125000    # Hz
**.sensorGW*[*].app[0].initialLoRaCR        = 4
**.sensorGW*[*].app[0].initialLoRaTP        = 14        # dBm

# ── ETSI DC uyumlu gönderim periyodu ────────────────────────────────────────
# exp(300s) ortalama → DC = 0.43/300 = 0.14% << 1% ✓
