# ==============================================================================
# CONFIG: Coverage1000km2 — 1024 km² Alan, Min-GW, Min-Mesh, Maks-Sensör
# ==============================================================================
# Boyut      : 32 km × 32 km = 1024 km²
# GW         : 2 × HybridGateway (min GW, tam alan kapsama)
# Mesh       : 1 × MeshNode merkez röle (min relay)
# Sensör     : 10 × EndNode × 2 GW = 20 toplam (maks LoRaWAN bağlantı)
# Koşul      : İDEAL — σ=0 (gölgeleme yok), parazit yok, serbest-uzay
# Kapsama    : SF12/−141dBm/14dBm → d_max≈32km; köşe=17.9km < 32km  ✓
#
# Failover Senaryosu:
#   t=0        GW1 ONLINE,  GW2 ONLINE  — normal çalışma
#   t=1800s    GW1 internet kesilir → FAILOVER modu
#   t=1800s+   GW1 trafiği: sensör→GW1→MeshNode1→GW2→networkServer
#   GW2        Daima ONLINE (internet çıkış noktası)
#   DER        1.0 boyunca korunur — sıfır paket kaybı beklenir
#
# Sensör Çift-Kapsama (x≈15-17km):
#   sensorGW1[3,4] ve sensorGW2[3,4] her iki GW menzilindedir.
#   GW1 arızasında bu sensörler doğrudan GW2 üzerinden hizmet alır.
# ==============================================================================
[Config Coverage1000km2]
network = LoraMeshNetwork1000km2
sim-time-limit = 3600s
description = "1024km² min-2GW+1MeshNode, 20 sensör, ideal kosul, backhaul failover"

# ── GlobalArp (LoRaGW EthernetEncapsulation uyumluluğu) ─────────────────────
**.arp.typename = "GlobalArp"

# ── IP Yönlendirme ────────────────────────────────────────────────────────────
**.gwRouter1.ipv4.forwarding = true

# ── LoRaWAN Fiziksel Ortam — İdeal Koşul ─────────────────────────────────────
# σ=0   : Gölgeleme yok → deterministik yol kaybı → paket alımı garantili
# separateTransmissionParts=false : Çakışma/parazit modeli devre dışı
# neighborCache.range=20000m : 15km'deki sensörleri kapsayacak arama penceresi
**.radioMedium.mediumLimitCache.maxTransmissionDuration = 5s   # SF12 ToA 1.97s
**.radioMedium.pathLossType = "LoRaLogNormalShadowing"
**.sigma = 0.0                                                  # σ=0 → ideal
**.minInterferenceTime = 0s
**.radioMedium.mediumLimitCacheType = "LoRaMediumCache"
**.radioMedium.rangeFilter = "communicationRange"
**.radioMedium.neighborCacheType = "LoRaNeighborCache"
**.radioMedium.neighborCache.range = 20000m                     # 20km > 15km max
**.radioMedium.neighborCache.refillPeriod = 3600s
LoraMeshNetwork1000km2.**.radio.separateTransmissionParts = false
LoraMeshNetwork1000km2.**.radio.separateReceptionParts = false

# ── Beacon & Routing ──────────────────────────────────────────────────────────
**.routingAgent.beaconInterval   = 10s
**.routingAgent.neighborTimeout  = 60s
**.meshNode1.meshRouting.beaconInterval = 10s

# ── Batarya Modeli: MeshNode.ned default IdealEpEnergyStorage kullanılır ──────
# (IdealEpEnergyStorage: sonsuz kapasite, NodeStatus gerekmez)
# NOT: SimpleEpEnergyStorage, NodeStatus lifecycle modülü gerektirir — ideal
#      koşul config'inde enerji tükenmesi simüle edilmez, IdealEp uygundur.

# ── MeshNode WLAN → wlanMedium (LoRaMedium çakışmasını önler) ────────────────
**.meshNode1.wlan[*].radio.radioMediumModule = "wlanMedium"

# ==============================================================================
# HybridGateway 1 — Batı (8 km, 16 km)
# Gorev: 10 sensörü LoRaWAN ile toplar; t=1800s'de internet kesilir
# Failover: GW1 → meshNode1 → GW2 → networkServer
# ==============================================================================
**.hybridGW1.routingAgent.meshAddress     = "10.1.0.1"
**.hybridGW1.routingAgent.beaconRssi      = -72.0
**.hybridGW1.routingAgent.sensorPacketRate = 10.0              # 10 sensör
**.hybridGW1.routingAgent.maxQueueSize    = 200
**.hybridGW1.routingAgent.backhaulCutTime = 1800s              # t=30dk kesme
**.hybridGW1.routingAgent.meshNeighborList = "meshNode1 hybridGW2"
# SX1303+SX1250: -141dBm hassasiyet (FLoRa default -100dBm'yi geçersiz kıl)
**.hybridGW1.LoRaGWNic.radio.receiver.sensitivity = -141dBm
**.hybridGW1.LoRaGWNic.radio.iAmGateway  = true
**.hybridGW1.packetForwarder.localPort   = 2000
**.hybridGW1.packetForwarder.destPort    = 1000
**.hybridGW1.packetForwarder.destAddresses = "networkServer"
# BTK/ETSI Band M downlink parametreleri (HybridRouting.ned'de okunan)
**.hybridGW1.routingAgent.bandMTxPower_dBm  = 14.0
**.hybridGW1.routingAgent.bandMDutyCycle    = 0.01
**.hybridGW1.routingAgent.rx2TxPower_dBm    = 27.0
**.hybridGW1.routingAgent.rx2DutyCycle      = 0.10
**.hybridGW1.routingAgent.rx2Frequency      = 869.525MHz
**.hybridGW1.routingAgent.antennaGain_dBi   = 0.0
**.hybridGW1.routingAgent.numDemodulators   = 16
**.hybridGW1.routingAgent.txQuotaWindow     = 3600s

# ==============================================================================
# HybridGateway 2 — Doğu (24 km, 16 km)
# Görev: 10 sensörü toplar + GW1 failover trafiğini internete iletir
# Her zaman ONLINE (backhaulCutTime = -1s → kes yok)
# ==============================================================================
**.hybridGW2.routingAgent.meshAddress     = "10.1.0.2"
**.hybridGW2.routingAgent.beaconRssi      = -72.0
**.hybridGW2.routingAgent.sensorPacketRate = 10.0              # 10 sensör
**.hybridGW2.routingAgent.maxQueueSize    = 400                # GW1 failover yükü
**.hybridGW2.routingAgent.backhaulCutTime = -1s                # daima ONLINE
**.hybridGW2.routingAgent.meshNeighborList = "meshNode1 hybridGW1"
**.hybridGW2.LoRaGWNic.radio.receiver.sensitivity = -141dBm
**.hybridGW2.LoRaGWNic.radio.iAmGateway  = true
**.hybridGW2.packetForwarder.localPort   = 2001
**.hybridGW2.packetForwarder.destPort    = 1000
**.hybridGW2.packetForwarder.destAddresses = "networkServer"
**.hybridGW2.ipv4.forwarding = true
**.hybridGW2.routingAgent.bandMTxPower_dBm  = 14.0
**.hybridGW2.routingAgent.bandMDutyCycle    = 0.01
**.hybridGW2.routingAgent.rx2TxPower_dBm    = 27.0
**.hybridGW2.routingAgent.rx2DutyCycle      = 0.10
**.hybridGW2.routingAgent.rx2Frequency      = 869.525MHz
**.hybridGW2.routingAgent.antennaGain_dBi   = 0.0
**.hybridGW2.routingAgent.numDemodulators   = 16
**.hybridGW2.routingAgent.txQuotaWindow     = 3600s

# ==============================================================================
# MeshNode 1 — Merkez Röle (16 km, 16 km)
# Görev: GW1↔GW2 köprüsü; GW1 failover trafiğini GW2'ye aktarır
# ==============================================================================
**.meshNode1.meshRouting.meshAddress     = "10.2.0.1"
**.meshNode1.meshRouting.neighborTimeout = 60s
**.meshNode1.meshRouting.meshNeighborList = "hybridGW1 hybridGW2"

# ==============================================================================
# NetworkServer
# Her iki GW'den paket alır; downlink ACK hedefini dinamik seçer
# ==============================================================================
**.networkServer.numApps = 1
**.networkServer.app[0].typename      = "NetworkServerApp"
**.networkServer.app[0].localPort     = 1000
**.networkServer.app[0].destPort      = 2000
**.networkServer.app[0].destAddresses = "hybridGW1 hybridGW2"

