description    = "Faz4_GW=5 Mesh=1 MAX: 50 sensör, 4 MeshNode, sigma=5.0, gamma=2.8, obstacle=3.5dB, noiseFloor=-105dBm, sendInterval=180s (BTK/KET YasalSinir)"

