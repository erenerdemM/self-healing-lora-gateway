[Config Faz4_GW2_Mesh4_MIN]
network        = LoraMesh_GW2_Mesh4_MIN
sim-time-limit = 1200s
description    = "Faz4_GW=2 Mesh=4 MIN: 20 sensör, 4 MeshNode, sigma=5.0, gamma=2.8, obstacle=3.5dB, noiseFloor=-105dBm, sendInterval=180s (BTK/KET YasalSinir)"

