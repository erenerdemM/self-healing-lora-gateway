#   Sensitivity   = -130 dBm (SX1272/73) 
#   PL(10km)      = 31.54 + 27.5*log10(10000) = 141.54 dB → Rx = -127.5 dBm
#   Margin        = -127.5 - (-130) = 2.5 dB  ✓  (σ=0 → deterministik)
#   ToA(SF9)      ≈  185 ms  →  DC = 185/200000 = 0.093 % ≪ 1 % ✓
#   Beklenen etki : SF12'ye göre ~10× daha kısa airtime → çarpışma ↓
# ==============================================================================

[Config IzmirSF9]
extends = Izmir
description = "Izmir all-SF9 | ToA=185ms (10x daha kısa) | 140 sensor | rural"

# SF9 override
**.sensor[*].app[0].initialLoRaSF = 9

# maxTransmissionDuration: SF9 ToA = 185ms, biraz pay bırak
**.radioMedium.mediumLimitCache.maxTransmissionDuration = 1s

# ==============================================================================
# [Config IzmirSF10]  —  Izmir ili: tüm sensörler SF10
# ==============================================================================
# SF10 / BW125kHz / 14dBm / 11B
#   Sensitivity   = -133 dBm
#   PL(10km)      = 141.54 dB → Rx = -127.5 dBm
#   Margin        = 5.5 dB  ✓
#   ToA(SF10)     ≈  371 ms  →  DC = 0.19 % ✓
#   Beklenen etki : SF12'ye göre ~5× daha kısa airtime → çarpışma ↓
# ==============================================================================

[Config IzmirSF10]
extends = Izmir
description = "Izmir all-SF10 | ToA=371ms (5x daha kısa) | 140 sensor | rural"

# SF10 override
**.sensor[*].app[0].initialLoRaSF = 10

# maxTransmissionDuration: SF10 ToA = 371ms
**.radioMedium.mediumLimitCache.maxTransmissionDuration = 1s

# ==============================================================================
# [Config IzmirMixedSF]  —  Izmir ili: SF9 + SF10 + SF11 + SF12 (karışık)
# ==============================================================================
# FLoRa nonOrthDelta matrisi: farklı SF paketleri quasi-ortogonal
#   Aynı SF → eşik = 1 dB    (kolayca çarpışma)
#   Farklı SF → eşik = -8...-25 dB  (eşit güçlerde çarpışma yok!)
#
# Her GW kümesindeki 5 sensör:
#   sensor[gw*5+0] → SF9   (ToA=185ms,  menzil=12.3km ✓)
#   sensor[gw*5+1] → SF10  (ToA=371ms,  menzil=15.8km ✓)
#   sensor[gw*5+2] → SF11  (ToA=742ms,  menzil=18.7km ✓)
#   sensor[gw*5+3] → SF12  (ToA=1483ms, menzil=30.8km ✓)
#   sensor[gw*5+4] → SF9   (ToA=185ms,  menzil=12.3km ✓)
#
# Beklenen etki: Her GW'de 2×SF9 + 1×SF10 + 1×SF11 + 1×SF12
#   → cross-SF paketler çarpışmıyor
#   → DER önemli ölçüde artacak
# ==============================================================================

[Config IzmirMixedSF]
extends = Izmir
description = "Izmir Mixed SF9/SF10/SF11/SF12 | quasi-orthogonal | 140 sensor"

# maxTransmissionDuration: SF12 ToA = 1483ms, SF9 en kısa
**.radioMedium.mediumLimitCache.maxTransmissionDuration = 5s

