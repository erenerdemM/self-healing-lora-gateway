**.meshNode1.mobility.initialY = 390m
**.meshNode2.mobility.initialX = 610m
**.meshNode2.mobility.initialY = 280m
**.meshNode3.mobility.initialX = 610m
**.meshNode3.mobility.initialY = 510m

**.gwRouter1.mobility.initialX = 760m
**.gwRouter1.mobility.initialY = 200m
**.gwRouter2.mobility.initialX = 760m
**.gwRouter2.mobility.initialY = 510m

**.networkServer.mobility.initialX = 920m
**.networkServer.mobility.initialY = 355m

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 1100m
**.constraintAreaMaxY = 650m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxZ = 0m

# =============================================================================
# [Config RealWorldTest] — Gerçek Topoloji ile Self-Healing Doğrulaması
# =============================================================================
# KESİN TOPOLOJİ:
#   hybridGW1  → 5 sensör (sensorGW1[0..4]), SADECE meshNode1 ile mesh
#   hybridGW2  → 4 sensör (sensorGW2[0..3]), SADECE meshNode2 ile mesh
#   hybridGW3  → 8 sensör (sensorGW3[0..7]), SADECE meshNode4 ile mesh
#
#   Mesh zinciri:
#     meshNode1 ↔ hybridGW1
#     meshNode1 ↔ meshNode2 ↔ hybridGW2
#     meshNode1 ↔ meshNode3 ↔ meshNode4 ↔ hybridGW3
#
# KURAL:
#   - Sensörler RASTGELE zamanlarda gönderim yapar (uniform dağılım)
#   - TÜM 3 GW RASTGELE zamanda internet bağlantısını keser
#   - İnternet VARKEN: GW SADECE beacon yayınlar, mesh'e sensör verisi GÖNDERMEZ
#   - İnternet GİDİNCE: GW en iyi hedef GW'yi seçer, mesh'e aktarır
#
# Beklentiler:
#   t=0..~100s : 3 GW beacon gönderir → komşu tabloları dolar
#   t=~120s    : hybridGW1 backhaulı kesilir (random 80-160s) → SENARYO B aktif
#   t=~200s    : hybridGW2 backhaulı kesilir (random 150-250s)
#   t=~260s    : hybridGW3 backhaulı kesilir (random 200-320s)
#   Her GW: C_i karşılaştırması ile en düşük maliyetli ONLINE GW seçilir
# =============================================================================
[Config RealWorldTest]
network = LoraMeshNetwork
sim-time-limit = 400s

# ── GlobalArp (LoRaGW EthernetEncapsulation uyumluluğu) ─────────────────────
**.arp.typename = "GlobalArp"

# ── Ipv4NetworkConfigurator ──────────────────────────────────────────────────
LoraMeshNetwork.configurator.config = xmldoc("network-config.xml")
LoraMeshNetwork.configurator.addStaticRoutes = false
**.ipv4.configurator.networkConfiguratorModule = "LoraMeshNetwork.configurator"

# ── Beacon & Routing Global Parametreleri ────────────────────────────────────
**.routingAgent.beaconInterval = 10s
**.routingAgent.neighborTimeout = 60s

# ── hybridGW1: 5 sensör, RASTGELE backhaul kesme (80-160s arası) ─────────────
**.hybridGW1.routingAgent.backhaulCutTime = uniform(80s, 160s)
**.hybridGW1.routingAgent.meshAddress = "10.1.0.1"
**.hybridGW1.routingAgent.beaconRssi = -78.0
**.hybridGW1.routingAgent.sensorPacketRate = 2.5
**.hybridGW1.routingAgent.maxQueueSize = 50
**.hybridGW1.routingAgent.meshNeighborList = "meshNode1"

# ── hybridGW2: 4 sensör, RASTGELE backhaul kesme (150-250s arası) ────────────
**.hybridGW2.routingAgent.backhaulCutTime = uniform(150s, 250s)
**.hybridGW2.routingAgent.meshAddress = "10.1.0.2"
**.hybridGW2.routingAgent.beaconRssi = -65.0
**.hybridGW2.routingAgent.sensorPacketRate = 2.0
**.hybridGW2.routingAgent.maxQueueSize = 50
**.hybridGW2.routingAgent.meshNeighborList = "meshNode2"

# ── hybridGW3: 8 sensör, RASTGELE backhaul kesme (200-320s arası) ────────────
**.hybridGW3.routingAgent.backhaulCutTime = uniform(200s, 320s)
**.hybridGW3.routingAgent.meshAddress = "10.1.0.3"
**.hybridGW3.routingAgent.beaconRssi = -85.0
**.hybridGW3.routingAgent.sensorPacketRate = 4.0
**.hybridGW3.routingAgent.maxQueueSize = 50
**.hybridGW3.routingAgent.meshNeighborList = "meshNode4"

# ── MeshNode Adresleri ve Topoloji Zorlaması ─────────────────────────────────
# meshNode1: hybridGW1 + meshNode2 + meshNode3 komşuları
**.meshNode1.meshRouting.meshAddress = "10.2.0.1"
**.meshNode1.meshRouting.meshNeighborList = "hybridGW1 meshNode2 meshNode3"
**.meshNode1.meshRouting.beaconInterval = 10s

# meshNode2: meshNode1 + hybridGW2 komşuları
**.meshNode2.meshRouting.meshAddress = "10.2.0.2"
**.meshNode2.meshRouting.meshNeighborList = "meshNode1 hybridGW2"
**.meshNode2.meshRouting.beaconInterval = 10s

# meshNode3: meshNode1 + meshNode4 komşuları
**.meshNode3.meshRouting.meshAddress = "10.2.0.3"
**.meshNode3.meshRouting.meshNeighborList = "meshNode1 meshNode4"
**.meshNode3.meshRouting.beaconInterval = 10s

# meshNode4: meshNode3 + hybridGW3 komşuları
**.meshNode4.meshRouting.meshAddress = "10.2.0.4"
**.meshNode4.meshRouting.meshNeighborList = "meshNode3 hybridGW3"
**.meshNode4.meshRouting.beaconInterval = 10s

# ── MeshNode WLAN → wlanMedium ────────────────────────────────────────────────
**.meshNode*.wlan[*].radio.radioMediumModule = "wlanMedium"

# ── IP Forwarding ─────────────────────────────────────────────────────────────
**.gwRouter1.ipv4.forwarding = true
**.hybridGW2.ipv4.forwarding = true
**.hybridGW3.ipv4.forwarding = true

# ── PacketForwarder (3 GW → networkServer) ───────────────────────────────────
**.hybridGW1.packetForwarder.localPort = 2000
**.hybridGW1.packetForwarder.destPort = 1000
**.hybridGW1.packetForwarder.destAddresses = "networkServer"
**.hybridGW1.LoRaGWNic.radio.iAmGateway = true

**.hybridGW2.packetForwarder.localPort = 2001
**.hybridGW2.packetForwarder.destPort = 1000
**.hybridGW2.packetForwarder.destAddresses = "networkServer"
**.hybridGW2.LoRaGWNic.radio.iAmGateway = true

**.hybridGW3.packetForwarder.localPort = 2002
**.hybridGW3.packetForwarder.destPort = 1000
**.hybridGW3.packetForwarder.destAddresses = "networkServer"
**.hybridGW3.LoRaGWNic.radio.iAmGateway = true

# ── NetworkServer ─────────────────────────────────────────────────────────────
**.networkServer.numApps = 1
**.networkServer.app[0].typename = "NetworkServerApp"
**.networkServer.app[0].localPort = 1000
**.networkServer.app[0].destPort = 2000
**.networkServer.app[0].destAddresses = "hybridGW1 hybridGW2 hybridGW3"

# ── Sensör Grubu 1: sensorGW1[0..4] → hybridGW1 (5 sensör, RASTGELE gönderi) ─
**.sensorGW1[*].numApps = 1
**.sensorGW1[*].app[0].typename = "SensorLoRaApp"
**.sensorGW1[*].app[0].numberOfPacketsToSend = 0
**.sensorGW1[*].app[0].startTime = uniform(5s, 35s)
**.sensorGW1[*].app[0].sendInterval = uniform(40s, 90s)
**.sensorGW1[*].app[0].dataSize = 11B
**.sensorGW1[*].app[0].initialLoRaTP = 14dBm
**.sensorGW1[*].app[0].initialLoRaCF = 868MHz
**.sensorGW1[*].app[0].initialLoRaSF = 12
**.sensorGW1[*].app[0].initialLoRaBW = 125kHz
**.sensorGW1[*].app[0].initialLoRaCR = 4
**.sensorGW1[*].app[0].initialUseHeader = true

# ── Sensör Grubu 2: sensorGW2[0..3] → hybridGW2 (4 sensör, RASTGELE gönderi) ─
**.sensorGW2[*].numApps = 1
**.sensorGW2[*].app[0].typename = "SensorLoRaApp"
**.sensorGW2[*].app[0].numberOfPacketsToSend = 0
**.sensorGW2[*].app[0].startTime = uniform(5s, 35s)
**.sensorGW2[*].app[0].sendInterval = uniform(40s, 90s)
**.sensorGW2[*].app[0].dataSize = 11B
**.sensorGW2[*].app[0].initialLoRaTP = 14dBm
**.sensorGW2[*].app[0].initialLoRaCF = 868MHz
**.sensorGW2[*].app[0].initialLoRaSF = 12
**.sensorGW2[*].app[0].initialLoRaBW = 125kHz
**.sensorGW2[*].app[0].initialLoRaCR = 4
**.sensorGW2[*].app[0].initialUseHeader = true

# ── Sensör Grubu 3: sensorGW3[0..7] → hybridGW3 (8 sensör, RASTGELE gönderi) ─
**.sensorGW3[*].numApps = 1
**.sensorGW3[*].app[0].typename = "SensorLoRaApp"
**.sensorGW3[*].app[0].numberOfPacketsToSend = 0
**.sensorGW3[*].app[0].startTime = uniform(5s, 35s)
**.sensorGW3[*].app[0].sendInterval = uniform(40s, 90s)
**.sensorGW3[*].app[0].dataSize = 11B
**.sensorGW3[*].app[0].initialLoRaTP = 14dBm
**.sensorGW3[*].app[0].initialLoRaCF = 868MHz
**.sensorGW3[*].app[0].initialLoRaSF = 12
**.sensorGW3[*].app[0].initialLoRaBW = 125kHz
**.sensorGW3[*].app[0].initialLoRaCR = 4
**.sensorGW3[*].app[0].initialUseHeader = true

# ── LoRaWAN Fiziksel Ortam ────────────────────────────────────────────────────
**.radioMedium.mediumLimitCache.maxTransmissionDuration = 5s
**.radioMedium.pathLossType = "LoRaLogNormalShadowing"
**.sigma = 3.57
**.minInterferenceTime = 0s
**.radioMedium.mediumLimitCacheType = "LoRaMediumCache"
**.radioMedium.rangeFilter = "communicationRange"
**.radioMedium.neighborCacheType = "LoRaNeighborCache"
**.radioMedium.neighborCache.range = 1000m
**.radioMedium.neighborCache.refillPeriod = 3000s
LoraMeshNetwork.**.radio.separateTransmissionParts = false
LoraMeshNetwork.**.radio.separateReceptionParts = false

# ── Sabit Konumlar (2200x2400 canvas) ───────────────────────────────────────
#
#  YATAY ZİNCİR (Y=600):  GW1(200,600)─400m─MN1(600,600)─400m─MN2(1000,600)─400m─GW2(1400,600)
#  DÜŞEY ZİNCİR (X=600):  MN1(600,600)─400m─MN3(600,1000)─400m─MN4(600,1400)─400m─GW3(600,1800)
#
#  Her atlama = 400 m (max haberleşme menzilini domine eden mesafe)
#
#  SENSÖR DAĞILIMI:
#    sensorGW1[0] : max menzil — tam kuzey  400m  GW1'den
#    sensorGW1[1] : max menzil — KD köşe   ~440m  GW1'den
#    sensorGW1[2] : orta menzil — KBat     ~220m  GW1'den
#    sensorGW1[3] : min menzil  — doğu      ~60m  GW1'den
#    sensorGW1[4] : min menzil  — güney     ~65m  GW1'den
#
#    sensorGW2[0] : max menzil — tam doğu  400m  GW2'den
#    sensorGW2[1] : max menzil — tam kuzey 400m  GW2'den
#    sensorGW2[2] : orta menzil — KBat    ~280m  GW2'den
#    sensorGW2[3] : min menzil             ~70m  GW2'den
#
#    sensorGW3[0] : max menzil — tam güney 400m  GW3'den
#    sensorGW3[1] : max menzil — tam batı  400m  GW3'den
#    sensorGW3[2] : max menzil — GB köşe  ~390m  GW3'den
#    sensorGW3[3] : orta menzil — doğu    ~206m  GW3'den
#    sensorGW3[4] : orta menzil — KB      ~241m  GW3'den
#    sensorGW3[5] : min menzil  — KD       ~61m  GW3'den
#    sensorGW3[6] : min menzil  — GB       ~64m  GW3'den
#    sensorGW3[7] : orta menzil — KD      ~270m  GW3'den
# ─────────────────────────────────────────────────────────────────────────────
**.mobility.initFromDisplayString = false

# ── hybridGW1 — Yatay zincir sol ucu (200, 600) ───────────────────────────────
**.hybridGW1.mobility.initialX = 200m
**.hybridGW1.mobility.initialY = 600m

# Sensör Grubu 1 — hybridGW1 (200, 600) etrafında, çeşitli mesafeler
# [0] MAX menzil: tam kuzey (200, 200) → 400 m
**.sensorGW1[0].mobility.initialX = 200m
**.sensorGW1[0].mobility.initialY = 200m
