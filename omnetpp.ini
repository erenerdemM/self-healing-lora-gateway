# ── Sensör Uygulama Katmanı (wildcard: tüm sensorGW* dizileri) ─────────────
**.sensorGW*[*].numApps                      = 1
**.sensorGW*[*].app[0].typename              = "SensorLoRaApp"
**.sensorGW*[*].app[0].numberOfPacketsToSend = 0
**.sensorGW*[*].app[0].initialLoRaTP         = 14dBm
**.sensorGW*[*].app[0].initialLoRaCF         = 868.1MHz
**.sensorGW*[*].app[0].initialLoRaBW         = 125kHz
**.sensorGW*[*].app[0].initialLoRaCR         = 4
**.sensorGW*[*].app[0].initialUseHeader      = true

# ── Staggered start: SF12 ToA=1.97s → 3.5s aralık (tüm SF için güvenli) ──
**.sensorGW0[0].app[0].startTime = 2.0s
**.sensorGW0[1].app[0].startTime = 5.5s
**.sensorGW0[2].app[0].startTime = 9.0s
