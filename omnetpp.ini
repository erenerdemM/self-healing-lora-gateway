# =============================================================================
# Config   : Scalable_GW5_Mesh7_MIN
# GW=5  MeshPerGap=7  Mod=MIN
# Hop=1000m  Gap=8000m  ToplamUzunluk=32000m
# MeshNode=28  Sensör=50 (10/GW)
# Run=36  (sensorSF 7..12 × meshSF 7..12), sigma=0.0
# =============================================================================

[Config Scalable_GW5_Mesh7_MIN]
network        = LoraMesh_GW5_Mesh7_MIN
sim-time-limit = 1200s
description    = "Scalable_GW=5 Mesh=7 MIN: 50 sensör, 28 MeshNode, sigma=0, gamma=2.75, sendInterval=180s (BTK/KET GlobalMax)"

output-scalar-file = results/Scalable_GW5_Mesh7_MIN-${runnumber}.sca

**.scalar-recording = true
**.vector-recording = false

# ── Kartezyen çarpım: sensorSF × meshSF = 36 run ──────────────────────────
**.sensorGW*[*].app[0].initialLoRaSF       = ${sensorSF    = 7, 8, 9, 10, 11, 12}
**.meshNode[*].meshRouting.loraSF           = ${meshSF      = 7, 8, 9, 10, 11, 12}
**.radioMedium.pathLoss.sigma               = 0.0
**.sigma                                    = 0.0

# ── sensorSF paralel (!): sendInterval + gwSensitivity ────────────────────
**.sensorGW*[*].app[0].dataSize      = 20B
**.sensorGW*[*].app[0].sendInterval  = 180s
# NOTE: sendInterval sabit 180s — SF bağımsız trafik yoğunluğu testi
**.LoRaGWNic.radio.receiver.sensitivity = ${gwSensitivity = -124dBm, -127dBm, -130dBm, -133dBm, -135dBm, -141dBm ! sensorSF}

# ── meshSF paralel (!): beaconInterval + cadDuration ──────────────────────
**.meshNode[*].meshRouting.beaconInterval = ${meshInterval = 5s, 9s, 17s, 29s, 63s, 265s ! meshSF}
**.meshNode[*].meshRouting.cadDuration    = ${cadDur       = 1ms, 2ms, 4ms, 8ms, 16ms, 33ms ! meshSF}

# ── LoRaWAN Fiziksel Ortam ─────────────────────────────────────────────────
**.radioMedium.pathLoss.d0          = 1m
**.radioMedium.pathLoss.gamma       = 2.75
**.radioMedium.pathLoss.pl_d0_db    = 31.54
**.radioMedium.pathLoss.max_sensitivity_dBm = -115.0
**.radioMedium.mediumLimitCache.maxTransmissionDuration = 5s
**.radioMedium.mediumLimitCache.maxTransmissionPower = 0.025118W
**.radioMedium.pathLossType         = "LoRaLogNormalShadowing"
**.minInterferenceTime              = 0s
**.radioMedium.mediumLimitCacheType = "LoRaMediumCache"
**.radioMedium.rangeFilter          = "communicationRange"
**.radioMedium.neighborCacheType    = "LoRaNeighborCache"
**.radioMedium.neighborCache.range  = 35000m
**.radioMedium.neighborCache.refillPeriod = 1200s
LoraMesh_GW5_Mesh7_MIN.**.radio.separateTransmissionParts = false
