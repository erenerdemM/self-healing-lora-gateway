# =============================================================================
# Config   : Faz4_GW5_Mesh7_MIN
# GW=5  MeshPerGap=7  Mod=MIN
# Hop=1000m  Gap=8000m  ToplamUzunluk=32000m
# MeshNode=28  Sensör=50 (10/GW)
# Run=36  (sensorSF 7..12 × meshSF 7..12), sigma=5.0
# =============================================================================

[Config Faz4_GW5_Mesh7_MIN]
network        = LoraMesh_GW5_Mesh7_MIN
sim-time-limit = 1200s
description    = "Faz4_GW=5 Mesh=7 MIN: 50 sensör, 28 MeshNode, sigma=5.0, gamma=2.8, obstacle=3.5dB, noiseFloor=-105dBm, sendInterval=180s (BTK/KET YasalSinir)"

output-scalar-file = results_faz4/Faz4_GW5_Mesh7_MIN-${runnumber}.sca

**.scalar-recording = true
**.vector-recording = false

# ── Kartezyen çarpım: sensorSF × meshSF = 36 run ──────────────────────────
