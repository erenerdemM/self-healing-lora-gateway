**.sensorGW*[*].energyStorage.initialCapacity    = 46620J

# ── MeshNode güç yönetimi: CAD SF10-gerçekçi değerler ───────────────────────
# Tsym(SF10)=8.192ms → cadDuration=2×Tsym=16ms, cadInterval=40ms
# cadInterval=40ms ≤ preamble(16×8.192=131ms) - cadDuration(16) = 115ms → güvenli ✓
# (Not: MeshNode.ned default 16ms (LongFast SF11/250kHz). Urban25km: SF10 değiştirmiyor.)
**.meshNode*.meshRouting.cadInterval = 0.04s     # 40ms (MeshNode.ned default=0.1s)
**.meshNode*.meshRouting.cadDuration = 16ms      # SF10: 2×8.192ms (şimdi default ile örtüşüyor ✓)

# Zaman-ortalamalı CAD güç tüketimi (SF10):
#   P_avg = (16/56)×0.037W + (40/56)×0.0000555W = 10.6 mW
**.meshNode*.wlan[*].radio.energyConsumer.receiverIdlePowerConsumption = 0.01057W

**.meshNode*.energyStorage.typename           = "SimpleEpEnergyStorage"
**.meshNode*.energyStorage.nominalCapacity    = 46620J    # Heltec HT-CT62: 3500mAh × 3.7V
