[Config Izmir]
network = LoraMeshNetworkIzmir
sim-time-limit = 3600s
description = "Izmir ili 200kmx110km=22000km2, 28 HybridGW, 7 MeshNode, 140 sensor, rural kalibrasyonu"

# ── Global ARP ─────────────────────────────────────────────────────────────────
**.arp.typename = "GlobalArp"

# ── IP Yönlendirme ─────────────────────────────────────────────────────────────
**.gwRouter1.ipv4.forwarding = true
**.gwRouter2.ipv4.forwarding = true
**.gwRouter3.ipv4.forwarding = true
**.coreRouter.ipv4.forwarding = true

# ── LoRaWAN Fiziksel Ortam — Kırsal Açık Alan Kalibrasyonu ────────────────────
# FLoRa LoRaLogNormalShadowing artık NED parametreli:
#   pl_d0_db=31.54dB (serbest uzay @ 1m, 868MHz), d0=1m, gamma=2.75
# Bütçe: 14-(-141)=155dB → d_max = 10^((155-31.54)/27.5) = 15,200m > 14km ✓
**.radioMedium.pathLoss.d0 = 1m
**.radioMedium.pathLoss.gamma = 2.75
**.radioMedium.pathLoss.sigma = 0.0
**.radioMedium.pathLoss.pl_d0_db = 31.54
**.radioMedium.pathLoss.max_sensitivity_dBm = -141.0
**.radioMedium.mediumLimitCache.maxTransmissionDuration = 5s
**.radioMedium.pathLossType = "LoRaLogNormalShadowing"
**.sigma = 0.0
**.minInterferenceTime = 0s
**.radioMedium.mediumLimitCacheType = "LoRaMediumCache"
**.radioMedium.rangeFilter = "communicationRange"
**.radioMedium.neighborCacheType = "LoRaNeighborCache"
**.radioMedium.neighborCache.range = 20000m
**.radioMedium.neighborCache.refillPeriod = 3600s
LoraMeshNetworkIzmir.**.radio.separateTransmissionParts = false
LoraMeshNetworkIzmir.**.radio.separateReceptionParts = false

# ── Beacon & Routing ───────────────────────────────────────────────────────────
**.routingAgent.beaconInterval = 10s
**.routingAgent.neighborTimeout = 60s
**.meshNode[*].meshRouting.beaconInterval = 10s

# ── WLAN medium (MeshNode'lar için) ───────────────────────────────────────────
**.meshNode[*].wlan[*].radio.radioMediumModule = "wlanMedium"

