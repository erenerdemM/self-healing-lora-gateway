[Config Scalable_GW4_Mesh4_MIN]
network        = LoraMesh_GW4_Mesh4_MIN
sim-time-limit = 1200s
description    = "Scalable_GW=4 Mesh=4 MIN: 40 sensör, 12 MeshNode, sigma=0, gamma=2.75, sendInterval=180s (BTK/KET GlobalMax)"

