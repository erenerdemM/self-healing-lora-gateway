# =============================================================================
# omnetpp.ini — Self-Healing Hybrid LoRa Gateway Simülasyon Konfigürasyonu
# =============================================================================
# Proje: Kendi Kendini İyileştiren Hibrit LoRa Gateway Mimarisi
#   Eren ERDEM (2020502028) — Melisa KURAL (2021502041)
#   DEÜ EEE — Danışman: Prof. Dr. Damla GÜRKAN KUNTALP
#
# Mimari: EndNode → HybridGW1 → [Mesh] → MeshNode → [Mesh] → HybridGW2 → NetworkServer
#
# [General / V1]: Temel topoloji doğrulama — DER=1.0, packetDropNoRouteFound=0
# [V2-Failover]  : hybridGW1 Ethernet'i t=200s'de kopar → Meshtastic G2G devreye (gelecek)
# [V2-SelfHeal]  : t=400s bağlantı geri gelir → ONLINE moda dönüş (gelecek)
# [V3-Multi]     : 3×EndNode, 2×HybridGW, 2×MeshNode, WRR yük dengeleme (gelecek)
# =============================================================================

[General]
network = LoraMeshNetwork
sim-time-limit = 600s

# =============================================================================
# GlobalArp — ARP istek/cevap paketleri göndermek yerine IP→MAC eşlemesini
# doğrudan InterfaceTable'dan alır.
# Gerekçe: LoRaGW.ned içindeki EthernetEncapsulation modülü
#   IInterfaceRegistrationListener'ı uygulamadığından, gerçek ARP mesajları
#   ipv4.lp dispatcher'ının interfaceIdToGateIndex tablosuna kaydedilemiyor.
#   Bu da "Unknown interface: interfaceId=100" hatasına yol açıyor.
#   GlobalArp bu sorunu tamamen ortadan kaldırır.
# Not: V2'de gerçek Meshtastic/LoRa ortamı eklenince bu satır kaldırılabilir.
# =============================================================================
**.arp.typename = "GlobalArp"

# =============================================================================
# EndNode (sensorNode1) — LoRaWAN saha sensörü
# Donanım: STM32L476RG + E77-900M (PDF Bölüm 3.2)
# Payload: 11B little-endian (sıcaklık/nem/basınç/batarya/sıra no)
# =============================================================================
**.sensorNode1.numApps = 1
**.sensorNode1.app[0].typename = "SensorLoRaApp"
**.sensorNode1.app[0].numberOfPacketsToSend = 0
**.sensorNode1.app[0].startTime = 10s
**.sensorNode1.app[0].sendInterval = exponential(600s)  # ETSI EN 300 220: ToA=1.97s → DC=0.33% < 1% ✓
**.sensorNode1.app[0].dataSize = 11B

# EU868 PHY — ETSI EN 300 220 uyumlu (PDF Bölüm 5.5.1)
# SF12: sensitivity=-137dBm, max kapsama alanı, duty cycle: 1%/saat max
**.sensorNode1.app[0].initialLoRaTP = 14dBm
**.sensorNode1.app[0].initialLoRaCF = 868MHz
**.sensorNode1.app[0].initialLoRaSF = 12
**.sensorNode1.app[0].initialLoRaBW = 125kHz
**.sensorNode1.app[0].initialLoRaCR = 4
**.sensorNode1.app[0].initialUseHeader = true

# =============================================================================
# LoRaWAN Fiziksel Ortam (radioMedium) — EndNode ↔ HybridGateway arasında
# =============================================================================
**.radioMedium.mediumLimitCache.maxTransmissionDuration = 5s   # SF12 ToA ~2.8s
**.radioMedium.pathLossType = "LoRaLogNormalShadowing"
**.sigma = 3.57
**.minInterferenceTime = 0s
**.radioMedium.mediumLimitCacheType = "LoRaMediumCache"
**.radioMedium.rangeFilter = "communicationRange"
**.radioMedium.neighborCacheType = "LoRaNeighborCache"
**.radioMedium.neighborCache.range = 1000m
**.radioMedium.neighborCache.refillPeriod = 3000s
LoraMeshNetwork.**.radio.separateTransmissionParts = false
LoraMeshNetwork.**.radio.separateReceptionParts = false

# =============================================================================
# HybridGateway 1 (hybridGW1) — LoRaWAN birincil gateway, internet YOK
# Donanım: RPi CM4 + RAK5146 (SX1303) + Heltec HT-CT62 (SX1262) — PDF Bölüm 5.1
#
# V1: PacketForwarder → networkServer
#     IP yolu: hybridGW1 → meshNode1 (IP router) → hybridGW2 (IP forwarder) → networkServer
#     (Ipv4NetworkConfigurator bu zinciri otomatik kurar)
# V2: Failover Agent state machine, Rlink izleme, ONLINE/FAILOVER mod geçişi
# =============================================================================
**.hybridGW1.packetForwarder.localPort = 2000
**.hybridGW1.packetForwarder.destPort = 1000
**.hybridGW1.packetForwarder.destAddresses = "networkServer"
**.hybridGW1.LoRaGWNic.radio.iAmGateway = true
# SX1303+SX1250 alıcı hassasiyeti override — FLoRa default -100dBm → gerçek -141dBm
**.hybridGW1.LoRaGWNic.radio.receiver.sensitivity = -141dBm
**.hybridGW2.LoRaGWNic.radio.receiver.sensitivity = -141dBm

# =============================================================================
# MeshNode (meshNode1) — Meshtastic relay düğümü
# V1: INET Router — IP forwarding otomatik (Router varsayılanı)
# V2: SX1262 LoRa radyo + MeshtasticMedium ile gerçek mesh relay
# =============================================================================
# (V1: MeshNode extends Router — forwarding=true otomatik, özel parametre yok)

# GAP-5 (V2): numWlanInterfaces=1 ile WLAN enerji tüketimi ölçülür.
# INET Radio modülü varsayılan olarak "radioMedium" adlı modülü arar,
# bu FLoRa LoRaMedium'dur. WLAN radyolarını ayrı Ieee80211ScalarRadioMedium'a
# (wlanMedium) yönlendiriyoruz:
**.meshNode1.wlan[*].radio.radioMediumModule = "wlanMedium"

# =============================================================================
# HybridGateway 2 (hybridGW2) — internet çıkışlı hibrit gateway
# Donanım: RPi CM4 + RAK5146 (SX1303) + Heltec HT-CT62 (SX1262) — PDF Bölüm 5.1
#
# V1: IP forwarder olarak çalışır (meshNode1'den geleni networkServer'a iletir)
#     hybridGW2 LoRaGW tabanlı olduğu için forwarding açıkça etkinleştirilmeli.
#     ipv4.forwarding = NetworkLayer seviyesi → routingTable.forwarding=true da olur.
#     (ipv4.ip.forwarding yerine ipv4.forwarding: Ipv4NetworkLayer *.forwarding propagation)
# V2: Meshtastic alıcı modülü + LNS transmitter + QoS queue eklenir
# =============================================================================
**.hybridGW2.ipv4.forwarding = true
# hybridGW2'de PacketForwarder var (LoRaGW tabanı), ancak V1'de LoRa RX yapmaz.
# Parametreler boş bırakılırsa interactive prompt hatası verir → dummy değerler:
**.hybridGW2.packetForwarder.localPort = 2001   # GW1'den farklı port
**.hybridGW2.packetForwarder.destPort = 1000
**.hybridGW2.packetForwarder.destAddresses = "networkServer"
**.hybridGW2.LoRaGWNic.radio.iAmGateway = false  # V1: sadece IP relay, LoRa RX değil
# NOTE: V1 topolojisinde hybridGW2 artık gwRouter2 (INET Router) olarak temsil
# edilmektedir. Bu satırlar yorum olarak korundu — V2'de HybridGateway geri gelince
# aktive edilecek.

# =============================================================================
# NetworkServer — Bulut / Yerel LNS
# Yazılım: ChirpStack v4, TTN, Azure IoT Hub (PDF Bölüm 3.3-3.4)
# =============================================================================
**.networkServer.numApps = 1
**.networkServer.app[0].typename = "NetworkServerApp"
**.networkServer.app[0].localPort = 1000
**.networkServer.app[0].destPort = 2000
**.networkServer.app[0].destAddresses = "hybridGW1"   # downlink ACK hedefi

# =============================================================================
# Konum Parametreleri (StationaryMobility)
# initFromDisplayString=false: ini değerleri kullanılır
# =============================================================================
**.mobility.initFromDisplayString = false

# EndNode: hybridGW1'e ~56m (SF12 ile test edildi, DER=1.0)
**.sensorNode1.mobility.initialX = 310m
**.sensorNode1.mobility.initialY = 240m

# hybridGW1 — LoRaWAN birincil gateway (internet yok)
**.hybridGW1.mobility.initialX = 350m
**.hybridGW1.mobility.initialY = 220m

# meshNode1 — Meshtastic relay (GW1 ile GW2 arasında)
**.meshNode1.mobility.initialX = 500m
**.meshNode1.mobility.initialY = 220m

# hybridGW2 — internet çıkışlı gateway
**.gwRouter2.mobility.initialX = 650m
**.gwRouter2.mobility.initialY = 220m

# NetworkServer — bulut konumu (RF mesafesi önemsiz)
**.networkServer.mobility.initialX = 870m
**.networkServer.mobility.initialY = 220m

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 1000m
**.constraintAreaMaxY = 600m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxZ = 0m

# =============================================================================
# [Config MultiNodeTest] — Çok Düğümlü Algoritma Doğrulaması
# =============================================================================
# Hedef: C_i maliyet fonksiyonu, darboğaz koruma ve CAD güç döngüsünü
#        kapsamlı çok-düğümlü senaryoda test et.
#
# Topoloji: 4 sensor → hybridGW1 → meshNode1 → meshNode2 → gwRouter1 → networkServer
#                                                         → meshNode3 → gwRouter2 →^
# Mock: 3 sahte komşu enjekte edilir; backhaul rastgele ~80-150s arası kesilir.
# =============================================================================
[Config MultiNodeTest]
network = MultiNodeNetwork
sim-time-limit = 600s

# ── Algoritma Testi: Mock Komşu Enjeksiyonu ───────────────────────────────────
# Her MeshNode ve hybridGW1'in routingAgent'ına başlangıçta sahte komşular
# enjekte edilir. Bu sayede gerçek beacon trafiği olmadan C_i formülü test edilir.
**.meshNode*.meshRouting.injectMockNeighbors = true
**.hybridGW1.routingAgent.injectMockNeighbors = true

# Mock komşular neighborTimeout boyunca tabloyu dolu tutar.
# MultiNodeTest'te uzun süre test için 300s timeout kullanılır:
**.meshNode*.meshRouting.neighborTimeout = 300s
**.hybridGW1.routingAgent.neighborTimeout = 300s

# ── Batarya Modeli: Heltec HT-CT62 — 3.7V × 3500mAh = 46620J ────────────────
# IdealEpEnergyStorage (MeshNode.ned default) sonsuz kapasiteli; burada gerçek
# Li-ion pil kapasitesiyle değiştiriyoruz: pil enerji tükenince cihaz durur.
**.meshNode*.energyStorage.typename          = "SimpleEpEnergyStorage"
**.meshNode*.energyStorage.nominalCapacity   = 46620J
**.meshNode*.energyStorage.initialCapacity   = 46620J

# ── Topoloji: IP Yönlendirme ─────────────────────────────────────────────────
**.gwRouter1.ipv4.forwarding = true
**.gwRouter2.ipv4.forwarding = true

# ── GlobalArp (V1 mirasından — LoRaGW EthernetEncapsulation uyumluluğu) ──────
**.arp.typename = "GlobalArp"

# ── WLAN → wlanMedium köprüsü (LoRaMedium çakışmasını önler) ─────────────────
**.meshNode*.wlan[*].radio.radioMediumModule = "wlanMedium"

# ── 4× Sensör: Staggered start times (darboğaz ve interleaving simülasyonu) ──
**.sensor*.numApps = 1
**.sensor*.app[0].typename = "SensorLoRaApp"
**.sensor*.app[0].numberOfPacketsToSend = 0
**.sensor*.app[0].sendInterval = exponential(600s)  # ETSI EN 300 220: ToA=1.97s → DC=0.33% < 1% ✓
**.sensor*.app[0].dataSize = 11B
**.sensor*.app[0].initialLoRaTP = 14dBm
**.sensor*.app[0].initialLoRaCF = 868MHz
**.sensor*.app[0].initialLoRaSF = 12
**.sensor*.app[0].initialLoRaBW = 125kHz
**.sensor*.app[0].initialLoRaCR = 4
**.sensor*.app[0].initialUseHeader = true

# Her sensör 15s farkla başlar → 4 sensör 0-45s arası interleaved trafik
**.sensor1.app[0].startTime = 10s
**.sensor2.app[0].startTime = 25s
**.sensor3.app[0].startTime = 40s
**.sensor4.app[0].startTime = 55s

# ── LoRaWAN Fiziksel Ortam ────────────────────────────────────────────────────
**.radioMedium.mediumLimitCache.maxTransmissionDuration = 5s
**.radioMedium.pathLossType = "LoRaLogNormalShadowing"
**.sigma = 3.57
**.minInterferenceTime = 0s
**.radioMedium.mediumLimitCacheType = "LoRaMediumCache"
**.radioMedium.rangeFilter = "communicationRange"
**.radioMedium.neighborCacheType = "LoRaNeighborCache"
**.radioMedium.neighborCache.range = 1000m
**.radioMedium.neighborCache.refillPeriod = 3000s
MultiNodeNetwork.**.radio.separateTransmissionParts = false
MultiNodeNetwork.**.radio.separateReceptionParts = false

# ── hybridGW1 PacketForwarder ─────────────────────────────────────────────────
**.hybridGW1.packetForwarder.localPort = 2000
**.hybridGW1.packetForwarder.destPort = 1000
**.hybridGW1.packetForwarder.destAddresses = "networkServer"
**.hybridGW1.LoRaGWNic.radio.iAmGateway = true

# ── NetworkServer ─────────────────────────────────────────────────────────────
**.networkServer.app[0].typename = "NetworkServerApp"
**.networkServer.app[0].localPort = 1000
**.networkServer.app[0].destPort = 2000
**.networkServer.app[0].destAddresses = "hybridGW1"

# ── Mobilite: Statik Konumlar ─────────────────────────────────────────────────
**.mobility.initFromDisplayString = false

**.sensor1.mobility.initialX = 180m
**.sensor1.mobility.initialY = 330m
**.sensor2.mobility.initialX = 230m
**.sensor2.mobility.initialY = 410m
**.sensor3.mobility.initialX = 180m
**.sensor3.mobility.initialY = 480m
**.sensor4.mobility.initialX = 270m
**.sensor4.mobility.initialY = 290m

**.hybridGW1.mobility.initialX = 310m
**.hybridGW1.mobility.initialY = 390m

**.meshNode1.mobility.initialX = 460m
**.meshNode1.mobility.initialY = 390m
**.meshNode2.mobility.initialX = 610m
**.meshNode2.mobility.initialY = 280m
**.meshNode3.mobility.initialX = 610m
**.meshNode3.mobility.initialY = 510m

**.gwRouter1.mobility.initialX = 760m
**.gwRouter1.mobility.initialY = 200m
**.gwRouter2.mobility.initialX = 760m
**.gwRouter2.mobility.initialY = 510m

**.networkServer.mobility.initialX = 920m
**.networkServer.mobility.initialY = 355m

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 1100m
**.constraintAreaMaxY = 650m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxZ = 0m

# =============================================================================
# [Config RealWorldTest] — Gerçek Topoloji ile Self-Healing Doğrulaması
# =============================================================================
# KESİN TOPOLOJİ:
#   hybridGW1  → 5 sensör (sensorGW1[0..4]), SADECE meshNode1 ile mesh
#   hybridGW2  → 4 sensör (sensorGW2[0..3]), SADECE meshNode2 ile mesh
#   hybridGW3  → 8 sensör (sensorGW3[0..7]), SADECE meshNode4 ile mesh
#
#   Mesh zinciri:
#     meshNode1 ↔ hybridGW1
#     meshNode1 ↔ meshNode2 ↔ hybridGW2
#     meshNode1 ↔ meshNode3 ↔ meshNode4 ↔ hybridGW3
#
# KURAL:
#   - Sensörler RASTGELE zamanlarda gönderim yapar (uniform dağılım)
#   - TÜM 3 GW RASTGELE zamanda internet bağlantısını keser
#   - İnternet VARKEN: GW SADECE beacon yayınlar, mesh'e sensör verisi GÖNDERMEZ
#   - İnternet GİDİNCE: GW en iyi hedef GW'yi seçer, mesh'e aktarır
#
# Beklentiler:
#   t=0..~100s : 3 GW beacon gönderir → komşu tabloları dolar
#   t=~120s    : hybridGW1 backhaulı kesilir (random 80-160s) → SENARYO B aktif
#   t=~200s    : hybridGW2 backhaulı kesilir (random 150-250s)
#   t=~260s    : hybridGW3 backhaulı kesilir (random 200-320s)
#   Her GW: C_i karşılaştırması ile en düşük maliyetli ONLINE GW seçilir
# =============================================================================
[Config RealWorldTest]
network = LoraMeshNetwork
sim-time-limit = 400s

# ── GlobalArp (LoRaGW EthernetEncapsulation uyumluluğu) ─────────────────────
**.arp.typename = "GlobalArp"

# ── Ipv4NetworkConfigurator ──────────────────────────────────────────────────
LoraMeshNetwork.configurator.config = xmldoc("network-config.xml")
LoraMeshNetwork.configurator.addStaticRoutes = false
**.ipv4.configurator.networkConfiguratorModule = "LoraMeshNetwork.configurator"

# ── Beacon & Routing Global Parametreleri ────────────────────────────────────
# NOT (V2): beaconInterval = 10s yalnızca sendDirect() (RF YOK) için geçerli.
# V2'de SX1262 LoRa PHY eklenince SF12@36B → ToA≈1.97s → DC=19.7% ❌ ETSI ihlali.
# V2 için beaconInterval ≥ 200s VE neighborTimeout ≥ 600s gerekir.
# Alternatif: beacon'ı SF7 ile gönder (ToA≈50ms → 10s@DC=0.5% ✓)
**.routingAgent.beaconInterval = 10s
**.routingAgent.neighborTimeout = 60s

# ── Batarya Modeli: Heltec HT-CT62 — 3.7V × 3500mAh = 46620J ────────────────
**.meshNode*.energyStorage.typename          = "SimpleEpEnergyStorage"
**.meshNode*.energyStorage.nominalCapacity   = 46620J
**.meshNode*.energyStorage.initialCapacity   = 46620J

# ── hybridGW1: 5 sensör, RASTGELE backhaul kesme (80-160s arası) ─────────────
**.hybridGW1.routingAgent.backhaulCutTime = uniform(80s, 160s)
**.hybridGW1.routingAgent.meshAddress = "10.1.0.1"
**.hybridGW1.routingAgent.beaconRssi = -78.0
**.hybridGW1.routingAgent.sensorPacketRate = 2.5
**.hybridGW1.routingAgent.maxQueueSize = 50
**.hybridGW1.routingAgent.meshNeighborList = "meshNode1"

# ── hybridGW2: 4 sensör, RASTGELE backhaul kesme (150-250s arası) ────────────
**.hybridGW2.routingAgent.backhaulCutTime = uniform(150s, 250s)
**.hybridGW2.routingAgent.meshAddress = "10.1.0.2"
**.hybridGW2.routingAgent.beaconRssi = -65.0
**.hybridGW2.routingAgent.sensorPacketRate = 2.0
**.hybridGW2.routingAgent.maxQueueSize = 50
**.hybridGW2.routingAgent.meshNeighborList = "meshNode2"

# ── hybridGW3: 8 sensör, RASTGELE backhaul kesme (200-320s arası) ────────────
**.hybridGW3.routingAgent.backhaulCutTime = uniform(200s, 320s)
**.hybridGW3.routingAgent.meshAddress = "10.1.0.3"
**.hybridGW3.routingAgent.beaconRssi = -85.0
**.hybridGW3.routingAgent.sensorPacketRate = 4.0
**.hybridGW3.routingAgent.maxQueueSize = 50
**.hybridGW3.routingAgent.meshNeighborList = "meshNode4"

# ── MeshNode Adresleri ve Topoloji Zorlaması ─────────────────────────────────
# meshNode1: hybridGW1 + meshNode2 + meshNode3 komşuları
**.meshNode1.meshRouting.meshAddress = "10.2.0.1"
**.meshNode1.meshRouting.meshNeighborList = "hybridGW1 meshNode2 meshNode3"
**.meshNode1.meshRouting.beaconInterval = 10s

# meshNode2: meshNode1 + hybridGW2 komşuları
**.meshNode2.meshRouting.meshAddress = "10.2.0.2"
**.meshNode2.meshRouting.meshNeighborList = "meshNode1 hybridGW2"
**.meshNode2.meshRouting.beaconInterval = 10s

# meshNode3: meshNode1 + meshNode4 komşuları
**.meshNode3.meshRouting.meshAddress = "10.2.0.3"
**.meshNode3.meshRouting.meshNeighborList = "meshNode1 meshNode4"
**.meshNode3.meshRouting.beaconInterval = 10s

# meshNode4: meshNode3 + hybridGW3 komşuları
**.meshNode4.meshRouting.meshAddress = "10.2.0.4"
**.meshNode4.meshRouting.meshNeighborList = "meshNode3 hybridGW3"
**.meshNode4.meshRouting.beaconInterval = 10s

# ── MeshNode WLAN → wlanMedium ────────────────────────────────────────────────
**.meshNode*.wlan[*].radio.radioMediumModule = "wlanMedium"

# ── IP Forwarding ─────────────────────────────────────────────────────────────
**.gwRouter1.ipv4.forwarding = true
**.hybridGW2.ipv4.forwarding = true
**.hybridGW3.ipv4.forwarding = true

# ── PacketForwarder (3 GW → networkServer) ───────────────────────────────────
**.hybridGW1.packetForwarder.localPort = 2000
**.hybridGW1.packetForwarder.destPort = 1000
**.hybridGW1.packetForwarder.destAddresses = "networkServer"
**.hybridGW1.LoRaGWNic.radio.iAmGateway = true

**.hybridGW2.packetForwarder.localPort = 2001
**.hybridGW2.packetForwarder.destPort = 1000
**.hybridGW2.packetForwarder.destAddresses = "networkServer"
**.hybridGW2.LoRaGWNic.radio.iAmGateway = true

**.hybridGW3.packetForwarder.localPort = 2002
**.hybridGW3.packetForwarder.destPort = 1000
**.hybridGW3.packetForwarder.destAddresses = "networkServer"
**.hybridGW3.LoRaGWNic.radio.iAmGateway = true

# ── NetworkServer ─────────────────────────────────────────────────────────────
**.networkServer.numApps = 1
**.networkServer.app[0].typename = "NetworkServerApp"
**.networkServer.app[0].localPort = 1000
**.networkServer.app[0].destPort = 2000
**.networkServer.app[0].destAddresses = "hybridGW1 hybridGW2 hybridGW3"

# ── Sensör Grubu 1: sensorGW1[0..4] → hybridGW1 (5 sensör, RASTGELE gönderi) ─
**.sensorGW1[*].numApps = 1
**.sensorGW1[*].app[0].typename = "SensorLoRaApp"
**.sensorGW1[*].app[0].numberOfPacketsToSend = 0
**.sensorGW1[*].app[0].startTime = uniform(5s, 35s)
**.sensorGW1[*].app[0].sendInterval = exponential(600s)   # ETSI EN 300 220: DC=0.33% < 1% ✓
**.sensorGW1[*].app[0].dataSize = 11B
**.sensorGW1[*].app[0].initialLoRaTP = 14dBm
**.sensorGW1[*].app[0].initialLoRaCF = 868MHz
**.sensorGW1[*].app[0].initialLoRaSF = 12
**.sensorGW1[*].app[0].initialLoRaBW = 125kHz
**.sensorGW1[*].app[0].initialLoRaCR = 4
**.sensorGW1[*].app[0].initialUseHeader = true

# ── Sensör Grubu 2: sensorGW2[0..3] → hybridGW2 (4 sensör, RASTGELE gönderi) ─
**.sensorGW2[*].numApps = 1
**.sensorGW2[*].app[0].typename = "SensorLoRaApp"
**.sensorGW2[*].app[0].numberOfPacketsToSend = 0
**.sensorGW2[*].app[0].startTime = uniform(5s, 35s)
**.sensorGW2[*].app[0].sendInterval = exponential(600s)   # ETSI EN 300 220: DC=0.33% < 1% ✓
**.sensorGW2[*].app[0].dataSize = 11B
**.sensorGW2[*].app[0].initialLoRaTP = 14dBm
**.sensorGW2[*].app[0].initialLoRaCF = 868MHz
**.sensorGW2[*].app[0].initialLoRaSF = 12
**.sensorGW2[*].app[0].initialLoRaBW = 125kHz
**.sensorGW2[*].app[0].initialLoRaCR = 4
**.sensorGW2[*].app[0].initialUseHeader = true

# ── Sensör Grubu 3: sensorGW3[0..7] → hybridGW3 (8 sensör, RASTGELE gönderi) ─
**.sensorGW3[*].numApps = 1
**.sensorGW3[*].app[0].typename = "SensorLoRaApp"
**.sensorGW3[*].app[0].numberOfPacketsToSend = 0
**.sensorGW3[*].app[0].startTime = uniform(5s, 35s)
**.sensorGW3[*].app[0].sendInterval = exponential(600s)   # ETSI EN 300 220: DC=0.33% < 1% ✓
**.sensorGW3[*].app[0].dataSize = 11B
**.sensorGW3[*].app[0].initialLoRaTP = 14dBm
**.sensorGW3[*].app[0].initialLoRaCF = 868MHz
**.sensorGW3[*].app[0].initialLoRaSF = 12
**.sensorGW3[*].app[0].initialLoRaBW = 125kHz
**.sensorGW3[*].app[0].initialLoRaCR = 4
**.sensorGW3[*].app[0].initialUseHeader = true

# ── LoRaWAN Fiziksel Ortam ────────────────────────────────────────────────────
**.radioMedium.mediumLimitCache.maxTransmissionDuration = 5s
**.radioMedium.pathLossType = "LoRaLogNormalShadowing"
**.sigma = 3.57
**.minInterferenceTime = 0s
**.radioMedium.mediumLimitCacheType = "LoRaMediumCache"
**.radioMedium.rangeFilter = "communicationRange"
**.radioMedium.neighborCacheType = "LoRaNeighborCache"
**.radioMedium.neighborCache.range = 1000m
**.radioMedium.neighborCache.refillPeriod = 3000s
LoraMeshNetwork.**.radio.separateTransmissionParts = false
LoraMeshNetwork.**.radio.separateReceptionParts = false

# ── Sabit Konumlar (2200x2400 canvas) ───────────────────────────────────────
#
#  YATAY ZİNCİR (Y=600):  GW1(200,600)─400m─MN1(600,600)─400m─MN2(1000,600)─400m─GW2(1400,600)
#  DÜŞEY ZİNCİR (X=600):  MN1(600,600)─400m─MN3(600,1000)─400m─MN4(600,1400)─400m─GW3(600,1800)
#
#  Her atlama = 400 m (max haberleşme menzilini domine eden mesafe)
#
#  SENSÖR DAĞILIMI:
#    sensorGW1[0] : max menzil — tam kuzey  400m  GW1'den
#    sensorGW1[1] : max menzil — KD köşe   ~440m  GW1'den
#    sensorGW1[2] : orta menzil — KBat     ~220m  GW1'den
#    sensorGW1[3] : min menzil  — doğu      ~60m  GW1'den
#    sensorGW1[4] : min menzil  — güney     ~65m  GW1'den
#
#    sensorGW2[0] : max menzil — tam doğu  400m  GW2'den
#    sensorGW2[1] : max menzil — tam kuzey 400m  GW2'den
#    sensorGW2[2] : orta menzil — KBat    ~280m  GW2'den
#    sensorGW2[3] : min menzil             ~70m  GW2'den
#
#    sensorGW3[0] : max menzil — tam güney 400m  GW3'den
#    sensorGW3[1] : max menzil — tam batı  400m  GW3'den
#    sensorGW3[2] : max menzil — GB köşe  ~390m  GW3'den
#    sensorGW3[3] : orta menzil — doğu    ~206m  GW3'den
#    sensorGW3[4] : orta menzil — KB      ~241m  GW3'den
#    sensorGW3[5] : min menzil  — KD       ~61m  GW3'den
#    sensorGW3[6] : min menzil  — GB       ~64m  GW3'den
#    sensorGW3[7] : orta menzil — KD      ~270m  GW3'den
# ─────────────────────────────────────────────────────────────────────────────
**.mobility.initFromDisplayString = false

# ── hybridGW1 — Yatay zincir sol ucu (200, 600) ───────────────────────────────
**.hybridGW1.mobility.initialX = 200m
**.hybridGW1.mobility.initialY = 600m

# Sensör Grubu 1 — hybridGW1 (200, 600) etrafında, çeşitli mesafeler
# [0] MAX menzil: tam kuzey (200, 200) → 400 m
**.sensorGW1[0].mobility.initialX = 200m
**.sensorGW1[0].mobility.initialY = 200m
# [1] MAX menzil: KD köşe (540, 310) → √(340²+290²) ≈ 447 m
**.sensorGW1[1].mobility.initialX = 540m
**.sensorGW1[1].mobility.initialY = 310m
# [2] ORTA menzil: kuzeybatı (40, 445) → √(160²+155²) ≈ 223 m
**.sensorGW1[2].mobility.initialX = 40m
**.sensorGW1[2].mobility.initialY = 445m
# [3] MIN menzil: çok yakın doğu (260, 596) → √(60²+4²) ≈ 60 m
**.sensorGW1[3].mobility.initialX = 260m
**.sensorGW1[3].mobility.initialY = 596m
# [4] MIN menzil: çok yakın güney (200, 665) → 65 m
**.sensorGW1[4].mobility.initialX = 200m
**.sensorGW1[4].mobility.initialY = 665m

# ── hybridGW2 — Yatay zincir sağ ucu (1400, 600) ─────────────────────────────
**.hybridGW2.mobility.initialX = 1400m
**.hybridGW2.mobility.initialY = 600m

# Sensör Grubu 2 — hybridGW2 (1400, 600) etrafında, çeşitli mesafeler
# [0] MAX menzil: tam doğu (1800, 600) → 400 m
**.sensorGW2[0].mobility.initialX = 1800m
**.sensorGW2[0].mobility.initialY = 600m
# [1] MAX menzil: tam kuzey (1400, 200) → 400 m
**.sensorGW2[1].mobility.initialX = 1400m
**.sensorGW2[1].mobility.initialY = 200m
# [2] ORTA menzil: kuzeybatı (1160, 450) → √(240²+150²) ≈ 283 m
**.sensorGW2[2].mobility.initialX = 1160m
**.sensorGW2[2].mobility.initialY = 450m
# [3] MIN menzil: çok yakın GB (1455, 545) → √(55²+55²) ≈ 78 m
**.sensorGW2[3].mobility.initialX = 1455m
**.sensorGW2[3].mobility.initialY = 545m

# ── hybridGW3 — Düşey zincir alt ucu (600, 1800) ─────────────────────────────
**.hybridGW3.mobility.initialX = 600m
**.hybridGW3.mobility.initialY = 1800m

# Sensör Grubu 3 — hybridGW3 (600, 1800) etrafında, çeşitli mesafeler
# [0] MAX menzil: tam güney (600, 2200) → 400 m
**.sensorGW3[0].mobility.initialX = 600m
**.sensorGW3[0].mobility.initialY = 2200m
# [1] MAX menzil: tam batı (200, 1800) → 400 m
**.sensorGW3[1].mobility.initialX = 200m
**.sensorGW3[1].mobility.initialY = 1800m
# [2] MAX menzil: GB köşe (310, 2060) → √(290²+260²) ≈ 390 m
**.sensorGW3[2].mobility.initialX = 310m
**.sensorGW3[2].mobility.initialY = 2060m
# [3] ORTA menzil: doğu (800, 1850) → √(200²+50²) ≈ 206 m
**.sensorGW3[3].mobility.initialX = 800m
**.sensorGW3[3].mobility.initialY = 1850m
# [4] ORTA menzil: kuzeybatı (420, 1640) → √(180²+160²) ≈ 241 m
**.sensorGW3[4].mobility.initialX = 420m
**.sensorGW3[4].mobility.initialY = 1640m
# [5] MIN menzil: çok yakın KD (645, 1758) → √(45²+42²) ≈ 62 m
**.sensorGW3[5].mobility.initialX = 645m
**.sensorGW3[5].mobility.initialY = 1758m
# [6] MIN menzil: çok yakın GB (555, 1845) → √(45²+45²) ≈ 64 m
**.sensorGW3[6].mobility.initialX = 555m
**.sensorGW3[6].mobility.initialY = 1845m
# [7] ORTA menzil: kuzeydoğu (810, 1630) → √(210²+170²) ≈ 270 m
**.sensorGW3[7].mobility.initialX = 810m
**.sensorGW3[7].mobility.initialY = 1630m

# ── Mesh Düğümleri ────────────────────────────────────────────────────────────
# meshNode1: yatay ve düşey zincirin kavşağı (600, 600)
**.meshNode1.mobility.initialX = 600m
**.meshNode1.mobility.initialY = 600m
# meshNode2: yatay zincir, MN1'den +400m doğu (1000, 600)
**.meshNode2.mobility.initialX = 1000m
**.meshNode2.mobility.initialY = 600m
# meshNode3: düşey zincir, MN1'den +400m güney (600, 1000)
**.meshNode3.mobility.initialX = 600m
**.meshNode3.mobility.initialY = 1000m
# meshNode4: düşey zincir, MN3'den +400m güney (600, 1400)
**.meshNode4.mobility.initialX = 600m
**.meshNode4.mobility.initialY = 1400m

# ── Ağ Altyapısı (kablolu, RF konumu önemsiz) ─────────────────────────────────
**.gwRouter1.mobility.initialX = 1700m
**.gwRouter1.mobility.initialY = 600m
**.networkServer.mobility.initialX = 1900m
**.networkServer.mobility.initialY = 600m

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 2200m
**.constraintAreaMaxY = 2400m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxZ = 0m

# ==============================================================================
# CONFIG: CityScale — Şehir Ölçekli Mesh (10 GW × 60 MN × 50 Sensör)
# Playground: 3000×3000 m | Ağ: LoraMeshNetworkCity
# Senaryo: Her GW farklı zamanda internet kesiyor → tüm paketler
#          60-düğümlü swarm üzerinden C_i metriği ile çoklu-atlama yönlendirilir.
# ==============================================================================
[Config CityScale]
network        = LoraMeshNetworkCity
sim-time-limit = 600s
description    = "City-Scale: 10 HybridGW, 60 MeshNode, 50 Sensor | 3000x3000m"

# ── IP Katmanı ────────────────────────────────────────────────────────────────
**.arp.typename = "GlobalArp"
LoraMeshNetworkCity.configurator.config          = xmldoc("network-config-city.xml")
LoraMeshNetworkCity.configurator.addStaticRoutes = false

# ── IP Yönlendirme ─────────────────────────────────────────────────────────────
**.gwRouter1.ipv4.forwarding = true

# ── Beacon Katmanı Globali ─────────────────────────────────────────────────────
# NOT (V2): beaconInterval = 10s yalnızca sendDirect() (RF YOK) simülasyonu için.
# V2 LoRa PHY gelince: beaconInterval ≥ 200s, neighborTimeout ≥ 600s yapılmalı.
**.routingAgent.beaconInterval   = 10s
**.routingAgent.neighborTimeout  = 60s

# ── Batarya Modeli: Heltec HT-CT62 — 3.7V × 3500mAh = 46620J ────────────────
**.meshNode*.energyStorage.typename          = "SimpleEpEnergyStorage"
**.meshNode*.energyStorage.nominalCapacity   = 46620J
**.meshNode*.energyStorage.initialCapacity   = 46620J

